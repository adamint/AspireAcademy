# Aspire Academy — Curriculum Structure
# 13 Worlds · ~85 Modules · ~350 Lessons
# Story app: Bazaar — a polyglot platform (C# API + TypeScript frontend + Python ML + Go worker)
# Grounded in the dotnet/aspire repo (March 2026)
# Polyglot throughout — C#, TypeScript, Python, Go examples from World 1

worlds:

  # ═══════════════════════════════════════════════════════════════════════════
  # WORLD 1 — THE DISTRIBUTED PROBLEM
  # ═══════════════════════════════════════════════════════════════════════════
  - id: world-1
    name: "The Distributed Problem"
    description: "Why distributed apps are hard and how Aspire solves the entire lifecycle — from any language."
    icon: "🌍"
    sortOrder: 1
    levelRangeStart: 1
    levelRangeEnd: 4
    unlockAfterWorld: null
    modules:
      - id: "1.1"
        name: "Why Distributed Apps Are Hard"
        description: "Service discovery, configuration drift, observability gaps, resilience, and the inner-loop tax."
        sortOrder: 1
        unlockAfterModule: null
        lessons:
          - id: "1.1.1"
            title: "The Five Headaches"
            description: "Service discovery, config management, observability, resilience, and the inner-loop tax."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 8
            contentFile: world-1/1.1.1-the-five-headaches.md
          - id: "1.1.2"
            title: "A Day in the Life (Without Aspire)"
            description: "A developer morning — Docker Compose files, env var spreadsheets, and three terminal tabs of logs."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 7
            unlockAfterLesson: "1.1.1"
            contentFile: world-1/1.1.2-day-without-aspire.md
