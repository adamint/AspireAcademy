        unlockAfterModule: "1.5"
        lessons:
          - id: "1.6.1"
            title: "Exploring the Dashboard"
            description: "Tour the Dashboard UI — resources table, console logs, structured logs, traces, and metrics."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 12
            contentFile: world-1/1.6.1-exploring-dashboard.md
          - id: "1.6.2"
            title: "Reading Distributed Traces"
            description: "How to follow a request across multiple services using the trace waterfall view."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.6.1"
            contentFile: world-1/1.6.2-reading-traces.md
          - id: "1.6.3"
            title: "Dashboard Quiz"
            description: "Test your knowledge of the Dashboard's features and how to diagnose issues with it."
            type: quiz
            sortOrder: 3
            xpReward: 100
            estimatedMinutes: 8
            unlockAfterLesson: "1.6.2"
            quizFile: 1.6.3-dashboard-quiz.yaml
          - id: "1.6-boss"
            title: "Boss: Build a Single-File AppHost App"
            description: "Build a 2-service app using a single-file AppHost with ServiceDefaults and the Dashboard."
            type: boss-battle
            sortOrder: 4
            xpReward: 750
            bonusXp: 375
            estimatedMinutes: 25
            isBoss: true
            unlockAfterLesson: "1.6.3"
            contentFile: world-1/1.6-boss.md
            challengeFile: 1.6-boss.yaml

