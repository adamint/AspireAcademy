            unlockAfterLesson: "1.1.2"
            contentFile: world-1/1.1.3-distributed-challenges-quiz.md
            quizFile: 1.1.3-distributed-challenges.yaml
      - id: "1.2"
        name: "What Aspire Is (and Isn't)"
        description: "A full-lifecycle polyglot platform — orchestration, integrations, tooling, observability, and deployment."
        sortOrder: 2
        unlockAfterModule: "1.1"
        lessons:
