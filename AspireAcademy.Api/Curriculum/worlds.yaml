worlds:
  - id: world-1
    name: Aspire Foundations
    description: "Learn the core concepts of Aspire: the app model, AppHost styles, ServiceDefaults, and the Dashboard."
    icon: "🌍"
    sortOrder: 1
    levelRangeStart: 1
    levelRangeEnd: 5
    unlockAfterWorld: null
    modules:
      - id: "1.1"
        name: Why Aspire?
        description: "Understand the distributed app problem and how Aspire solves it with orchestration and observability."
        sortOrder: 1
        unlockAfterModule: null
        lessons:
          - id: "1.1.1"
            title: Why Distributed Apps Are Hard
            description: "The challenges of building, configuring, and observing multi-service applications."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 8
            contentFile: world-1/1.1.1-why-distributed-apps-are-hard.md
          - id: "1.1.2"
            title: "Aspire's Solution: Orchestration + Observability"
            description: "How Aspire provides a unified app model with built-in service discovery, health checks, and telemetry."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.1.1"
            contentFile: world-1/1.1.2-aspires-solution.md
          - id: "1.1.2a"
            title: "Try It: Your First AppHost"
            description: "Write a minimal AppHost with DistributedApplication.CreateBuilder and add a container resource."
            type: challenge
            sortOrder: 3
            xpReward: 150
            bonusXp: 75
            estimatedMinutes: 10
            unlockAfterLesson: "1.1.2"
            challengeFile: 1.1.2a-first-apphost.yaml
          - id: "1.1.3"
            title: Aspire vs Docker Compose and Kubernetes
            description: "What makes Aspire different from other orchestration tools and when to use each."
            type: quiz
            sortOrder: 4
            xpReward: 100
            estimatedMinutes: 8
            unlockAfterLesson: "1.1.2a"
            contentFile: world-1/1.1.3-aspire-vs-alternatives.md
            quizFile: 1.1.3-aspire-vs-alternatives.yaml
          - id: "1.1-boss"
            title: "Boss: Identify the Architecture"
            description: "Given a system diagram, identify which components are AppHost, ServiceDefaults, and service projects."
            type: boss-battle
            sortOrder: 5
            xpReward: 500
            bonusXp: 250
            estimatedMinutes: 15
            isBoss: true
            unlockAfterLesson: "1.1.3"
            quizFile: 1.1-boss.yaml

      - id: "1.2"
        name: Creating Your First App
        description: "Use the Aspire CLI to scaffold a new project across C#, TypeScript, Python, and Java templates."
        sortOrder: 2
        unlockAfterModule: "1.1"
        lessons:
          - id: "1.2.1"
            title: "Creating a Project with aspire new"
            description: "Use the Aspire CLI to scaffold a new project and explore the generated file structure."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 10
            contentFile: world-1/1.2.1-aspire-new.md
          - id: "1.2.2"
            title: "Template Choices: C#, TypeScript, Python, Java"
            description: "Walk through each template variant — what gets generated and how the AppHost differs."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 12
            unlockAfterLesson: "1.2.1"
            contentFile: world-1/1.2.2-template-choices.md
          - id: "1.2.3"
            title: "DistributedApplication.CreateBuilder()"
            description: "The entry point of every AppHost — what CreateBuilder sets up and returns."
            type: learn
            sortOrder: 3
            xpReward: 50
            estimatedMinutes: 8
            unlockAfterLesson: "1.2.2"
            contentFile: world-1/1.2.3-create-builder.md
          - id: "1.2.4"
            title: "Build().Run() and the Dashboard"
            description: "What happens when you call Build().Run() — DCP starts, the Dashboard launches, resources are orchestrated."
            type: learn
            sortOrder: 4
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.2.3"
            contentFile: world-1/1.2.4-build-run-dashboard.md
          - id: "1.2.5"
            title: "First App Challenge"
            description: "Create an Aspire app with the CLI and add a project resource."
            type: challenge
            sortOrder: 5
            xpReward: 150
            bonusXp: 75
            estimatedMinutes: 12
            unlockAfterLesson: "1.2.4"
            contentFile: world-1/1.2.5-first-app-challenge.md
            challengeFile: 1.2.5-first-app-challenge.yaml
          - id: "1.2-boss"
            title: "Boss: Build a Two-Service App"
            description: "Create an Aspire app with an API and a Web frontend, wired together with WithReference."
            type: boss-battle
            sortOrder: 6
            xpReward: 500
            bonusXp: 250
            estimatedMinutes: 20
            isBoss: true
            unlockAfterLesson: "1.2.5"
            contentFile: world-1/1.2-boss.md
            challengeFile: 1.2-boss.yaml

      - id: "1.3"
        name: "Single-File vs .csproj AppHost"
        description: "Understand both AppHost styles — single-file apphost.cs and traditional .csproj project AppHosts."
        sortOrder: 3
        unlockAfterModule: "1.2"
        lessons:
          - id: "1.3.1"
            title: "Single-File AppHost: apphost.cs"
            description: "The new single-file AppHost format with #:sdk, #:package, #:project, and #:property directives."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 10
            contentFile: world-1/1.3.1-single-file-apphost.md
          - id: "1.3.2"
            title: "Traditional .csproj AppHost"
            description: "Project references, generated Projects.* types, and the MSBuild-based AppHost."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.3.1"
            contentFile: world-1/1.3.2-csproj-apphost.md
          - id: "1.3.3"
            title: "When to Use Which Style"
            description: "Trade-offs between single-file and .csproj AppHosts — complexity, tooling, CI, and polyglot support."
            type: quiz
            sortOrder: 3
            xpReward: 100
            estimatedMinutes: 8
            unlockAfterLesson: "1.3.2"
            contentFile: world-1/1.3.3-when-to-use-which.md
            quizFile: 1.3.3-when-to-use-which.yaml

      - id: "1.4"
        name: The Resource Model
        description: "Understand how Aspire models everything as resources with annotations and builder patterns."
        sortOrder: 4
        unlockAfterModule: "1.3"
        lessons:
          - id: "1.4.1"
            title: "IResource — Everything Is a Resource"
            description: "The base interface for all Aspire resources: Name and Annotations."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 8
            contentFile: world-1/1.4.1-iresource.md
          - id: "1.4.2"
            title: "Resource Type Hierarchy"
            description: "Resource, ContainerResource, ProjectResource, ExecutableResource, ParameterResource — the class tree."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.4.1"
            contentFile: world-1/1.4.2-resource-hierarchy.md
          - id: "1.4.3"
            title: "Annotations: Behavior Without Inheritance"
            description: "How IResourceAnnotation attaches capabilities to resources without deep class hierarchies."
            type: learn
            sortOrder: 3
            xpReward: 50
            estimatedMinutes: 12
            unlockAfterLesson: "1.4.2"
            contentFile: world-1/1.4.3-annotations.md
          - id: "1.4.4"
            title: "The IResourceBuilder<T> Pattern"
            description: "How the fluent builder pattern enables chained configuration with extension methods."
            type: challenge
            sortOrder: 4
            xpReward: 150
            bonusXp: 75
            estimatedMinutes: 12
            unlockAfterLesson: "1.4.3"
            challengeFile: 1.4.4-resource-builder.yaml
          - id: "1.4.5"
            title: "Resource States and Lifecycle"
            description: "Starting, Running, Finished, Exiting, FailedToStart — CustomResourceSnapshot and ResourceNotificationService."
            type: quiz
            sortOrder: 5
            xpReward: 100
            estimatedMinutes: 8
            unlockAfterLesson: "1.4.4"
            contentFile: world-1/1.4.5-resource-states.md
            quizFile: 1.4.5-resource-states.yaml
          - id: "1.4-boss"
            title: "Boss: Create a Custom Resource"
            description: "Define a custom resource class, add annotations, and register it in the AppHost."
            type: boss-battle
            sortOrder: 6
            xpReward: 500
            bonusXp: 250
            estimatedMinutes: 20
            isBoss: true
            unlockAfterLesson: "1.4.5"
            challengeFile: 1.4-boss.yaml

      - id: "1.5"
        name: ServiceDefaults Deep Dive
        description: "Master the cross-cutting concerns that ServiceDefaults configures for every service."
        sortOrder: 5
        unlockAfterModule: "1.4"
        lessons:
          - id: "1.5.1"
            title: "What AddServiceDefaults() Registers"
            description: "The full picture: OpenTelemetry, health checks, service discovery, and HTTP resilience."
            type: learn
            sortOrder: 1
            xpReward: 50
            estimatedMinutes: 10
            contentFile: world-1/1.5.1-service-defaults-overview.md
          - id: "1.5.2"
            title: "OpenTelemetry: Tracing with ActivitySource"
            description: "How distributed tracing works with Activity, ActivitySource, and OTLP exporters."
            type: learn
            sortOrder: 2
            xpReward: 50
            estimatedMinutes: 12
            unlockAfterLesson: "1.5.1"
            contentFile: world-1/1.5.2-tracing.md
          - id: "1.5.3"
            title: "Structured Logging and Metrics"
            description: "ILogger structured logging, custom metrics with IMeterFactory, and how they flow to the Dashboard."
            type: learn
            sortOrder: 3
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.5.2"
            contentFile: world-1/1.5.3-logging-metrics.md
          - id: "1.5.4"
            title: "Health Checks: /health and /alive"
            description: "How MapDefaultEndpoints() sets up health check endpoints and how Aspire monitors them."
            type: challenge
            sortOrder: 4
            xpReward: 150
            bonusXp: 75
            estimatedMinutes: 12
            unlockAfterLesson: "1.5.3"
            challengeFile: 1.5.4-health-checks.yaml
          - id: "1.5.5"
            title: "HTTP Resilience with Polly"
            description: "AddStandardResilienceHandler: retry, circuit breaker, timeout — how ConfigureHttpClientDefaults works."
            type: learn
            sortOrder: 5
            xpReward: 50
            estimatedMinutes: 10
            unlockAfterLesson: "1.5.4"
            contentFile: world-1/1.5.5-resilience.md
          - id: "1.5-boss"
            title: "Boss: Custom ServiceDefaults"
            description: "Configure ServiceDefaults with custom tracing, a custom health check, and tuned resilience policies."
            type: boss-battle
            sortOrder: 6
            xpReward: 500
            bonusXp: 250
            estimatedMinutes: 25
            isBoss: true
            unlockAfterLesson: "1.5.5"
            challengeFile: 1.5-boss.yaml

      - id: "1.6"
        name: The Aspire Dashboard
        description: "Navigate the Dashboard's Resources, Console Logs, Structured Logs, Traces, and Metrics views."
