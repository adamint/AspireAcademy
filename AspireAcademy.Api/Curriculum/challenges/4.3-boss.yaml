hints:
  - A project can reference multiple brokers with chained WithReference calls
  - Use WithDataVolume() on RabbitMQ to persist queue state across restarts
  - NATS needs WithJetStream() — without it, messages are fire-and-forget only
  - Each broker injects a connection string in its own format (AMQP URI, host:port, nats://)
requiredPackages:
