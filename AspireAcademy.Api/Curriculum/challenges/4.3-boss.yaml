starterCode: 'var builder = DistributedApplication.CreateBuilder(args);


  // Build the complete Atlas communication graph:

  // Infrastructure: PostgreSQL, Redis, RabbitMQ

  // Services: API (C#), ML (Python), Worker (Go), Frontend (Vite)

  // Wiring: API -> DB + Cache + Queue, ML -> Queue, Worker -> Queue, Frontend -> API

  // All with WaitFor dependencies


  builder.Build().Run();'
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\")\n    .WithLifetime(ContainerLifetime.Persistent)\n    .AddDatabase(\"atlas-db\");\n\
  var redis = builder.AddRedis(\"cache\");\nvar rabbitmq = builder.AddRabbitMQ(\"messaging\");\n\nvar api = builder.AddProject<Projects.AtlasApi>(\"api\")\n    .WithReference(postgres).WithReference(redis).WithReference(rabbitmq)\n\
  \    .WaitFor(postgres).WaitFor(redis).WaitFor(rabbitmq);\n\nbuilder.AddPythonApp(\"ml\", \"../atlas-ml\", \"app:app\")\n    .WithHttpEndpoint(port: 8000, env: \"PORT\")\n    .WithReference(rabbitmq).WithReference(api)\n\
  \    .WaitFor(rabbitmq);\n\nbuilder.AddExecutable(\"worker\", \"go\", \"../atlas-worker\", \"run\", \".\")\n    .WithReference(rabbitmq).WithReference(api)\n    .WaitFor(rabbitmq);\n\nbuilder.AddViteApp(\"\
  frontend\", \"../atlas-web\")\n    .WithReference(api)\n    .WaitFor(api);\n\nbuilder.Build().Run();"
