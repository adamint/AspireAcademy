instructions: |
  Build the complete Bazaar communication graph from scratch with all services wired together.

  **Infrastructure:** PostgreSQL (persistent), Redis, RabbitMQ

  **Services:**
  - C# API `"api"` → references DB + cache + queue, waits for all three
  - Python ML `"ml"` → references queue + API, waits for queue
  - Go worker `"worker"` → references queue + API, waits for queue
  - Vite frontend `"frontend"` → references API, waits for API

  Use `WithReference` for wiring and `WaitFor` for startup ordering.
starterCode: 'var builder = DistributedApplication.CreateBuilder(args);


  // Build the complete Bazaar communication graph:

  // Infrastructure: PostgreSQL, Redis, RabbitMQ

  // Services: API (C#), ML (Python), Worker (Go), Frontend (Vite)

  // Wiring: API -> DB + Cache + Queue, ML -> Queue, Worker -> Queue, Frontend -> API

  // All with WaitFor dependencies


  builder.Build().Run();'
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\")\n    .WithLifetime(ContainerLifetime.Persistent)\n    .AddDatabase(\"bazaar-db\");\n\
  var redis = builder.AddRedis(\"cache\");\nvar rabbitmq = builder.AddRabbitMQ(\"messaging\");\n\nvar api = builder.AddProject<Projects.BazaarApi>(\"api\")\n    .WithReference(postgres).WithReference(redis).WithReference(rabbitmq)\n\
  \    .WaitFor(postgres).WaitFor(redis).WaitFor(rabbitmq);\n\nbuilder.AddPythonApp(\"ml\", \"../bazaar-recs\", \"app:app\")\n    .WithHttpEndpoint(port: 8000, env: \"PORT\")\n    .WithReference(rabbitmq).WithReference(api)\n\
  \    .WaitFor(rabbitmq);\n\nbuilder.AddExecutable(\"worker\", \"go\", \"../bazaar-worker\", \"run\", \".\")\n    .WithReference(rabbitmq).WithReference(api)\n    .WaitFor(rabbitmq);\n\nbuilder.AddViteApp(\"\
  frontend\", \"../bazaar-web\")\n    .WithReference(api)\n    .WaitFor(api);\n\nbuilder.Build().Run();"
