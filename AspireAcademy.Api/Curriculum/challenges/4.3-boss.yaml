instructions: |
  # Boss Challenge: Event-Driven Order Pipeline

  Build an AppHost for an event-driven order processing system using all three message brokers.

  **Architecture:**
  - **RabbitMQ** handles command messages (order placement, cancellation)
  - **Kafka** streams events (order created, order shipped) for analytics
  - **NATS** delivers real-time notifications (with JetStream for durability)

  **What to do:**
  1. Add RabbitMQ named `"commands"` with `WithManagementPlugin()` and `WithDataVolume()`
  2. Add Kafka named `"events"` with `WithKafkaUI()`
  3. Add NATS named `"notifications"` with `WithJetStream()`
  4. Add project `"order-api"` referencing RabbitMQ and Kafka
  5. Add project `"analytics"` referencing Kafka
  6. Add project `"notifications-svc"` referencing NATS

  **Key concepts:**
  - Each broker uses a different connection string format
  - A project can reference multiple broker resources
  - Admin UIs help debug message flows during development
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add RabbitMQ "commands" with management plugin and data volume
  // TODO: Add Kafka "events" with KafkaUI
  // TODO: Add NATS "notifications" with JetStream
  // TODO: Add "order-api" referencing RabbitMQ and Kafka
  // TODO: Add "analytics" referencing Kafka
  // TODO: Add "notifications-svc" referencing NATS

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var commands = builder.AddRabbitMQ("commands")
      .WithManagementPlugin()
      .WithDataVolume();

  var events = builder.AddKafka("events")
      .WithKafkaUI();

  var notifications = builder.AddNats("notifications")
      .WithJetStream();

  builder.AddProject<Projects.OrderApi>("order-api")
      .WithReference(commands)
      .WithReference(events);

  builder.AddProject<Projects.Analytics>("analytics")
      .WithReference(events);

  builder.AddProject<Projects.NotificationsSvc>("notifications-svc")
      .WithReference(notifications);

  builder.Build().Run();
