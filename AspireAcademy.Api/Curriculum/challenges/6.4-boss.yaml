solutionCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.Testing;
  using System.Net.Http.Json;

  var builder = await DistributedApplicationTestingBuilder
      .CreateAsync<Projects.MyAppHost>();
  var app = await builder.BuildAsync();
  await app.StartAsync();

  var client = app.CreateHttpClient("apiservice");
  var response = await client.PostAsJsonAsync("/products", new { Name = "Widget", Price = 9.99 });
  response.EnsureSuccessStatusCode();

  var getResponse = await client.GetAsync("/products/1");
  getResponse.EnsureSuccessStatusCode();

  await app.DisposeAsync();

  Console.WriteLine("Integration test passed!");
