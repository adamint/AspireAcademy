instructions: |
  # Test Architect

  Write integration tests for an AppHost with API and PostgreSQL.

  **What to do:**
  1. Create a test class `ApiIntegrationTests` implementing `IAsyncLifetime`
  2. In `InitializeAsync`, create and start a `DistributedApplication` using `DistributedApplicationTestingBuilder`
  3. Write a test method that creates an `HttpClient`, POSTs a product, GETs it back, and asserts the result
  4. In `DisposeAsync`, dispose the application

  **Key concepts:**
  - `DistributedApplicationTestingBuilder.CreateAsync<T>()` creates a test AppHost
  - `app.CreateHttpClient(resourceName)` gets a configured HTTP client for a resource
  - `IAsyncLifetime` manages setup and teardown for async test fixtures
