solutionCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.Testing;

  public class ApiIntegrationTests : IAsyncLifetime
  {
      private DistributedApplication? _app;

      public async Task InitializeAsync()
      {
          var builder = await DistributedApplicationTestingBuilder
              .CreateAsync<Projects.MyAppHost>();
          _app = await builder.BuildAsync();
          await _app.StartAsync();
      }

      public async Task PostAndGetProduct_ReturnsCreatedProduct()
      {
          var client = _app!.CreateHttpClient("apiservice");
          var response = await client.PostAsJsonAsync("/products", new { Name = "Widget", Price = 9.99 });
          response.EnsureSuccessStatusCode();

          var getResponse = await client.GetAsync("/products/1");
          getResponse.EnsureSuccessStatusCode();
      }

      public async Task DisposeAsync()
      {
          if (_app is not null)
          {
              await _app.DisposeAsync();
          }
      }
  }
