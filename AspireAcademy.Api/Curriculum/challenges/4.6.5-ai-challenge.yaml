instructions: |
  # OpenAI Integration AppHost Challenge

  Build an AppHost that integrates OpenAI with Redis caching for an AI-powered API service.

  **What to do:**
  1. Add a connection string named `"openai"` for the OpenAI service
  2. Add a Redis resource named `"cache"` for caching AI responses
  3. Add an API project named `"api"` using `Projects.ApiService` that references both the OpenAI connection and the Redis cache
  4. Use `WaitFor` so the API starts after Redis is healthy

  **Key concepts:**
  - `AddConnectionString(name)` registers an external service connection from configuration
  - OpenAI is typically added as a connection string because it's an external API, not a container
  - Redis can cache AI responses to reduce latency and API costs
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add a connection string for OpenAI

  // TODO: Add Redis for caching AI responses

  // TODO: Add an API project that references OpenAI and the cache

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var openai = builder.AddConnectionString("openai");

  var cache = builder.AddRedis("cache");

  var api = builder.AddProject<Projects.ApiService>("api")
                   .WithReference(openai)
                   .WithReference(cache)
                   .WaitFor(cache);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Compiles successfully
    type: compiles
    expected: null
    description: Code must compile without errors
  - id: tc2
    name: Adds OpenAI connection string
    type: code-contains
    expected: AddConnectionString
    description: Must register a connection string for OpenAI
  - id: tc3
    name: Names the OpenAI connection
    type: code-contains
    expected: '"openai"'
    description: Connection string must be named 'openai'
  - id: tc4
    name: Uses AddRedis
    type: code-contains
    expected: AddRedis
    description: Must add a Redis resource for caching
  - id: tc5
    name: API references OpenAI
    type: code-contains
    expected: WithReference(openai)
    description: API must reference the OpenAI connection
  - id: tc6
    name: API references cache
    type: code-contains
    expected: WithReference(cache)
    description: API must reference the Redis cache
  - id: tc7
    name: Adds API project
    type: code-pattern
    expected: 'AddProject.*"api"'
    description: Must add a project named 'api'
  - id: tc8
    name: Uses WaitFor
    type: code-contains
    expected: WaitFor(cache)
    description: API must wait for Redis before starting
hints:
  - Use builder.AddConnectionString("openai") since OpenAI is an external API, not a container
  - Add Redis with builder.AddRedis("cache") to cache AI responses
  - The API project needs .WithReference() for both the openai connection and the cache
  - Only WaitFor the cache — connection strings don't need health checks
requiredPackages:
  - Aspire.Hosting
  - Aspire.Hosting.AppHost
  - Aspire.Hosting.Redis
