instructions: |
  Instrument the Atlas API with a complete observability stack.

  **Your tasks:**
  1. Add `ServiceDefaults` and map default health endpoints
  2. Add custom health checks for both the ML service and the Go worker
  3. Create a custom `ActivitySource` with spans for search and recommendation operations
  4. Create custom metrics: search count, recommendation count, and a latency histogram
  5. Add structured logging with query context using `ILogger`

  All three signals (traces, metrics, logs) will be visible in the Aspire Dashboard.
starterCode: '// Instrument the Atlas API with complete observability:

  // 1. ServiceDefaults

  // 2. Custom health checks for ML service and Worker

  // 3. Custom ActivitySource with spans for search and recommend

  // 4. Custom metrics: search count, recommendation count, latency histogram

  // 5. Structured logging with query context


  var builder = WebApplication.CreateBuilder(args);

  // TODO: Your observability code here

  var app = builder.Build();

  app.Run();'
solutionCode: "var builder = WebApplication.CreateBuilder(args);\n\nbuilder.AddServiceDefaults();\nbuilder.Services.AddHealthChecks()\n    .AddUrlGroup(new Uri(\"http://ml/health\"), \"ml-service\")\n \
  \   .AddUrlGroup(new Uri(\"http://worker/health\"), \"worker\");\n\nvar app = builder.Build();\napp.MapDefaultEndpoints();\n\nvar source = new ActivitySource(\"Atlas.Api\");\nvar meter = app.Services.GetRequiredService<IMeterFactory>().Create(\"\
  Atlas.Api\");\nvar searchCount = meter.CreateCounter<long>(\"atlas.search.count\");\nvar recoCount = meter.CreateCounter<long>(\"atlas.recommendations.count\");\nvar latency = meter.CreateHistogram<double>(\"\
  atlas.search.latency_ms\");\n\napp.MapGet(\"/search\", async (string query, ILogger<Program> logger) =>\n{\n    using var activity = source.StartActivity(\"Search\");\n    activity?.SetTag(\"search.query\"\
  , query);\n    searchCount.Add(1, new KeyValuePair<string, object?>(\"endpoint\", \"search\"));\n    var sw = Stopwatch.StartNew();\n    logger.LogInformation(\"Search requested for {Query}\", query);\n\
  \    // ...search logic...\n    latency.Record(sw.ElapsedMilliseconds);\n    return Results.Ok();\n});\n\napp.Run();"
