hints:
- Start with AddServiceDefaults() and MapDefaultEndpoints()
- Add health checks for each external service the API calls
- ActivitySource + StartActivity creates spans visible in the Dashboard traces view
- CreateHistogram records distributions (like latency percentiles)
- Use ILogger with message templates for structured logging
