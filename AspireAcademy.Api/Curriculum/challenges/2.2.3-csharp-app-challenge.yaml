instructions: |
  # C# App with Custom Configuration

  Use `AddCSharpApp` to add a standalone C# application and configure it with
  environment variables, endpoints, and resource references.

  **Your task:**
  1. Create the AppHost builder (provided)
  2. Add Redis named `"cache"`
  3. Add a C# app named `"worker"` from path `"../Worker"` using `AddCSharpApp("worker", "../Worker")`
  4. Chain `.WithReference(cache)` to give the worker access to Redis
  5. Chain `.WithEnvironment("WORKER_MODE", "batch")` to set an environment variable
  6. Chain `.WithHttpEndpoint(port: 8080)` to expose an HTTP endpoint
  7. Call `builder.Build().Run()`

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Redis named "cache"

  // TODO: Add a C# app "worker" from "../Worker" with:
  //   - Reference to cache
  //   - Environment variable WORKER_MODE = "batch"
  //   - HTTP endpoint on port 8080

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var cache = builder.AddRedis("cache");

  builder.AddCSharpApp("worker", "../Worker")
      .WithReference(cache)
      .WithEnvironment("WORKER_MODE", "batch")
      .WithHttpEndpoint(port: 8080);

  builder.Build().Run();

