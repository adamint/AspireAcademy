hints:
- WaitFor holds a service in Waiting state until its dependency is healthy
- Chain .WaitFor(resource) after .WithReference(resource)
- The API depends on three infrastructure resources
- The frontend only depends on the API — not directly on databases
requiredPackages:
- Aspire.Hosting.PostgreSQL
- Aspire.Hosting.Redis
- Aspire.Hosting.RabbitMQ
