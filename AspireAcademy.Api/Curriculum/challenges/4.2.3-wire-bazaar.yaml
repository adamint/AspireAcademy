instructions: |
  Add `WaitFor` dependencies to every Bazaar service so they start in the correct order.

  **Your tasks:**
  1. API should wait for postgres, redis, and rabbitmq before starting
  2. ML service should wait for rabbitmq
  3. Go worker should wait for rabbitmq
  4. Frontend should wait for the API

  `WaitFor` holds a service in a "Waiting" state until its dependency reports as healthy.
  Chain `.WaitFor(resource)` after `.WithReference(resource)` on each service.
starterCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\").AddDatabase(\"bazaar-db\");\nvar redis = builder.AddRedis(\"cache\");\nvar rabbitmq =\
  \ builder.AddRabbitMQ(\"messaging\");\n\nvar api = builder.AddProject<Projects.BazaarApi>(\"api\")\n    .WithReference(postgres)\n    .WithReference(redis)\n    .WithReference(rabbitmq);\n    // TODO:\
  \ API should wait for postgres, redis, and rabbitmq\n\nvar ml = builder.AddPythonApp(\"ml\", \"../bazaar-recs\", \"app:app\")\n    .WithReference(rabbitmq);\n    // TODO: ML should wait for rabbitmq\n\n\
  var worker = builder.AddExecutable(\"worker\", \"go\", \"../bazaar-worker\", \"run\", \".\")\n    .WithReference(rabbitmq);\n    // TODO: Worker should wait for rabbitmq\n\nvar frontend = builder.AddViteApp(\"\
  frontend\", \"../bazaar-web\")\n    .WithReference(api);\n    // TODO: Frontend should wait for api\n\nbuilder.Build().Run();"
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\").AddDatabase(\"bazaar-db\");\nvar redis = builder.AddRedis(\"cache\");\nvar rabbitmq\
  \ = builder.AddRabbitMQ(\"messaging\");\n\nvar api = builder.AddProject<Projects.BazaarApi>(\"api\")\n    .WithReference(postgres)\n    .WithReference(redis)\n    .WithReference(rabbitmq)\n    .WaitFor(postgres)\n\
  \    .WaitFor(redis)\n    .WaitFor(rabbitmq);\n\nvar ml = builder.AddPythonApp(\"ml\", \"../bazaar-recs\", \"app:app\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nvar worker = builder.AddExecutable(\"\
  worker\", \"go\", \"../bazaar-worker\", \"run\", \".\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nvar frontend = builder.AddViteApp(\"frontend\", \"../bazaar-web\")\n    .WithReference(api)\n\
  \    .WaitFor(api);\n\nbuilder.Build().Run();"
testCases:
