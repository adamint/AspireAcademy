instructions: |
  # Observable Order Service

  Instrument an order processing service with tracing, metrics, and health checks.

  **What to do:**
  1. Create an `ActivitySource` named `"OrderService"`
  2. Create a `Meter` named `"OrderService"` with a Counter and Histogram
  3. Register a custom health check for a payment provider
  4. Register the ActivitySource and Meter with OpenTelemetry
  5. Instrument the `/orders` endpoint with activities and metrics

  **Key concepts:**
  - `ActivitySource` creates distributed tracing spans
  - `Meter` with `CreateCounter` and `CreateHistogram` tracks numeric metrics
  - `AddServiceDefaults()` configures base telemetry; you extend it with custom sources
