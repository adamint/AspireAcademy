solutionCode: |
  using System.Diagnostics;
  using System.Diagnostics.Metrics;
  using Microsoft.Extensions.Diagnostics.HealthChecks;
  using OpenTelemetry.Metrics;
  using OpenTelemetry.Trace;

  var builder = WebApplication.CreateBuilder(args);

  var activitySource = new ActivitySource("OrderService");
  var meter = new Meter("OrderService");
  var ordersPlaced = meter.CreateCounter<long>("orders.placed");
  var orderDuration = meter.CreateHistogram<double>("orders.duration_ms");

  builder.Services.AddOpenTelemetry()
      .WithTracing(t => t.AddSource("OrderService"))
      .WithMetrics(m => m.AddMeter("OrderService"));

  builder.Services.AddHealthChecks()
      .AddCheck("payment-provider", () => HealthCheckResult.Healthy());

  var app = builder.Build();

  app.MapPost("/orders", async (Order order) =>
  {
      using var activity = activitySource.StartActivity("ProcessOrder");
      activity?.SetTag("order.id", order.Id);
      activity?.SetTag("order.total", order.Total);

      var sw = Stopwatch.StartNew();
      await Task.Delay(100);
      sw.Stop();

      ordersPlaced.Add(1);
      orderDuration.Record(sw.Elapsed.TotalMilliseconds);

      return Results.Created($"/orders/{order.Id}", order);
  });

  app.Run();

  record Order(string Id, decimal Total);
