solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\").AddDatabase(\"atlas-db\");\nvar redis = builder.AddRedis(\"cache\");\nvar rabbitmq\
  \ = builder.AddRabbitMQ(\"messaging\");\n\nvar api = builder.AddProject<Projects.AtlasApi>(\"api\")\n    .WithReference(postgres)\n    .WithReference(redis)\n    .WithReference(rabbitmq)\n    .WaitFor(postgres)\n\
  \    .WaitFor(redis)\n    .WaitFor(rabbitmq);\n\nvar ml = builder.AddPythonApp(\"ml\", \"../atlas-ml\", \"app:app\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nvar worker = builder.AddExecutable(\"\
  worker\", \"go\", \"../atlas-worker\", \"run\", \".\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nvar frontend = builder.AddViteApp(\"frontend\", \"../atlas-web\")\n    .WithReference(api)\n\
  \    .WaitFor(api);\n\nbuilder.Build().Run();"
testCases:
- type: code-contains
  description: API must wait for postgres
  value: WaitFor(postgres)
- type: code-contains
  description: API must wait for redis
  value: WaitFor(redis)
- type: code-contains
  description: API must wait for rabbitmq
  value: WaitFor(rabbitmq)
- type: code-contains
  description: ML must wait for rabbitmq
  value: .WaitFor(rabbitmq)
- type: code-contains
  description: Frontend must wait for api
  value: WaitFor(api)
hints:
- WaitFor holds a service in Waiting state until its dependency is healthy
- Chain .WaitFor(resource) after .WithReference(resource)
- The API depends on three infrastructure resources
- The frontend only depends on the API — not directly on databases
requiredPackages:
- Aspire.Hosting.PostgreSQL
- Aspire.Hosting.Redis
- Aspire.Hosting.RabbitMQ
