solutionCode: |
  var builder = WebApplication.CreateBuilder(args);

  builder.AddRedisDistributedCache("cache");
  builder.AddRabbitMQClient("messaging");

  var app = builder.Build();

  app.MapGet("/products/{id}", async (string id, IDistributedCache cache) =>
  {
      var cached = await cache.GetStringAsync($"product:{id}");
      if (cached is not null)
      {
          return Results.Ok(cached);
      }
      return Results.NotFound();
  });

  app.MapPost("/products/{id}/restock", async (string id, int qty, IConnection rmq) =>
  {
      using var channel = rmq.CreateModel();
      var body = System.Text.Encoding.UTF8.GetBytes($"{{\"id\":\"{id}\",\"qty\":{qty}}}");
      channel.BasicPublish("inventory.restocked", "", null, body);
      return Results.Ok("Restocked");
  });

  app.Run();
