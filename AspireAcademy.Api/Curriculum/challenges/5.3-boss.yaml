instructions: |
  # Cached API with Message Bus

  Build an API with Redis distributed caching and RabbitMQ event publishing.

  **What to do:**
  1. Register Redis distributed cache for connection `"cache"`
  2. Register RabbitMQ client for connection `"messaging"`
  3. Implement cache-first product lookup in GET `/products/{id}`
  4. Implement restock with event publishing in POST `/products/{id}/restock`

  **Key concepts:**
  - `AddRedisDistributedCache(connectionName)` registers `IDistributedCache`
  - `AddRabbitMQClient(connectionName)` registers RabbitMQ `IConnection`
  - Cache-aside pattern: check cache → fallback to data source → populate cache
