hints:
  - For OpenTelemetry, start with builder.Logging.AddOpenTelemetry(...) for logging, then builder.Services.AddOpenTelemetry().WithMetrics(...).WithTracing(...) for metrics and tracing
  - 'For health checks, chain: builder.Services.AddHealthChecks().AddCheck("self", () => HealthCheckResult.Healthy(), ["live"]).AddCheck("ready", () => HealthCheckResult.Healthy())'
  - For resilience, use builder.Services.ConfigureHttpClientDefaults(http => { http.AddStandardResilienceHandler(); http.AddServiceDiscovery(); })
