    name: "Must add PostgreSQL named 'pg'"
    description: "Must call AddPostgres with the name 'pg'"
    value: "AddPostgres(\"pg\")"
  - type: code-contains
    id: "t2"
    name: "Must add database named 'bazaar-db'"
    description: "Must call AddDatabase with the name 'bazaar-db'"
    value: "AddDatabase(\"bazaar-db\")"
  - type: code-contains
    id: "t3"
    name: "Must add Redis named 'cache'"
    description: "Must call AddRedis with the name 'cache'"
    value: "AddRedis(\"cache\")"
  - type: code-contains
    id: "t4"
    name: "Must add RabbitMQ named 'messaging'"
    description: "Must call AddRabbitMQ with the name 'messaging'"
    value: "AddRabbitMQ(\"messaging\")"
  - type: code-contains
    id: "t5"
    name: "Must use .WithReference() to wire services"
    description: "Must chain .WithReference() to wire service dependencies"
    value: ".WithReference("
  - type: code-contains
    id: "t6"
    name: "Must use .WaitFor() for startup ordering"
    description: "Must chain .WaitFor() for startup ordering"
    value: ".WaitFor("
  - type: code-contains
    id: "t7"
    name: "Must add Vite frontend named 'frontend'"
    description: "Must call AddViteApp with the name 'frontend'"
    value: "AddViteApp(\"frontend\""
  - type: code-contains
    id: "t8"
    name: "Must add Python ML service named 'ml'"
    description: "Must call AddPythonApp with the name 'ml'"
    value: "AddPythonApp(\"ml\""
hints:
  - "Start with infrastructure: AddPostgres, AddRedis, AddRabbitMQ"
  - "AddPostgres(\"pg\").AddDatabase(\"bazaar-db\") creates a server and a database"
  - "Use .WithReference() to inject connection strings and .WaitFor() for startup ordering"
  - "AddViteApp(\"frontend\", \"../bazaar-web\") adds a TypeScript/Vite frontend"
  - "AddPythonApp(\"ml\", \"../bazaar-recs\", \"app:app\") adds a Python FastAPI service"
requiredPackages:
  - Aspire.Hosting.PostgreSQL
  - Aspire.Hosting.Redis
  - Aspire.Hosting.RabbitMQ
  - Aspire.Hosting.NodeJs
  - Aspire.Hosting.Python
