instructions: |
  Wire up the complete Bazaar AppHost with all six resources across four languages.

  **Infrastructure:**
  - PostgreSQL server `"pg"` with a database `"bazaar-db"`
  - Redis cache `"cache"`
  - RabbitMQ message broker `"messaging"`

  **Services:**
  - C# API project `"api"` referencing postgres, redis, and rabbitmq
  - Vite frontend `"frontend"` at `"../bazaar-web"` referencing the API
  - Python ML service `"ml"` at `"../bazaar-recs"` with entry point `"app:app"` referencing rabbitmq

  **Dependencies:**
  - API waits for postgres, redis, and rabbitmq
  - Frontend waits for the API
  - ML waits for rabbitmq
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // Bazaar AppHost — wire up all six resources
  // Infrastructure:
  //   - PostgreSQL server "pg" with a database "bazaar-db"
  //   - Redis cache "cache"
  //   - RabbitMQ message broker "messaging"
  //
  // Services:
  //   - C# API project "api" that references postgres, redis, and rabbitmq
  //   - Vite frontend "frontend" at "../bazaar-web" that references the api
  //   - Python ML service "ml" at "../bazaar-recs" with entry point "app:app"
  //     that references rabbitmq
  //
  // Dependencies:
  //   - api waits for postgres, redis, and rabbitmq
  //   - frontend waits for api
  //   - ml waits for rabbitmq

  // TODO: Add your resources here

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("pg").AddDatabase("bazaar-db");
  var redis = builder.AddRedis("cache");
  var rabbitmq = builder.AddRabbitMQ("messaging");

  var api = builder.AddProject<Projects.BazaarApi>("api")
      .WithReference(postgres)
      .WithReference(redis)
      .WithReference(rabbitmq)
      .WaitFor(postgres)
      .WaitFor(redis)
      .WaitFor(rabbitmq);

  builder.AddViteApp("frontend", "../bazaar-web")
      .WithReference(api)
      .WaitFor(api);

  builder.AddPythonApp("ml", "../bazaar-recs", "app:app")
      .WithReference(rabbitmq)
      .WaitFor(rabbitmq);

  builder.Build().Run();
testCases:
