instructions: |
  # Boss Challenge: Custom ServiceDefaults

  Configure a complete ServiceDefaults file with custom tracing, a custom health check, and tuned resilience policies. This is what a production-ready ServiceDefaults looks like.

  **What to do:**
  1. In `ConfigureOpenTelemetry`:
     - Add OpenTelemetry logging with `IncludeFormattedMessage = true` and `IncludeScopes = true`
     - Add metrics with ASP.NET Core and HTTP client instrumentation
     - Add tracing with a custom `ActivitySource` named `"MyApp"`, plus ASP.NET Core and HTTP client instrumentation
  2. In `AddDefaultHealthChecks`:
     - Register a liveness check named `"self"` tagged `["live"]`
     - Register an additional check named `"ready"` that returns `HealthCheckResult.Healthy()`
  3. In `ConfigureResilience`:
     - Use `ConfigureHttpClientDefaults` to add `AddStandardResilienceHandler()` and `AddServiceDiscovery()`

  **Key concepts:**
  - `AddOpenTelemetry()` with `.WithMetrics()` and `.WithTracing()` for telemetry
  - `AddHealthChecks()` with `.AddCheck()` for health monitoring
  - `ConfigureHttpClientDefaults()` with `AddStandardResilienceHandler()` for resilience
