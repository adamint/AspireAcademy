instructions: |
  Wire up the complete Atlas AppHost with all six resources across four languages.

  **Infrastructure:**
  - PostgreSQL server `"pg"` with a database `"atlas-db"`
  - Redis cache `"cache"`
  - RabbitMQ message broker `"messaging"`

  **Services:**
  - C# API project `"api"` referencing postgres, redis, and rabbitmq
  - Vite frontend `"frontend"` at `"../atlas-web"` referencing the API
  - Python ML service `"ml"` at `"../atlas-ml"` with entry point `"app:app"` referencing rabbitmq

  **Dependencies:**
  - API waits for postgres, redis, and rabbitmq
  - Frontend waits for the API
  - ML waits for rabbitmq
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // Atlas AppHost — wire up all six resources
  // Infrastructure:
  //   - PostgreSQL server "pg" with a database "atlas-db"
  //   - Redis cache "cache"
  //   - RabbitMQ message broker "messaging"
  //
  // Services:
  //   - C# API project "api" that references postgres, redis, and rabbitmq
  //   - Vite frontend "frontend" at "../atlas-web" that references the api
  //   - Python ML service "ml" at "../atlas-ml" with entry point "app:app"
  //     that references rabbitmq
  //
  // Dependencies:
  //   - api waits for postgres, redis, and rabbitmq
  //   - frontend waits for api
  //   - ml waits for rabbitmq

  // TODO: Add your resources here

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("pg").AddDatabase("atlas-db");
  var redis = builder.AddRedis("cache");
  var rabbitmq = builder.AddRabbitMQ("messaging");

  var api = builder.AddProject<Projects.AtlasApi>("api")
      .WithReference(postgres)
      .WithReference(redis)
      .WithReference(rabbitmq)
      .WaitFor(postgres)
      .WaitFor(redis)
      .WaitFor(rabbitmq);

  builder.AddViteApp("frontend", "../atlas-web")
      .WithReference(api)
      .WaitFor(api);

  builder.AddPythonApp("ml", "../atlas-ml", "app:app")
      .WithReference(rabbitmq)
      .WaitFor(rabbitmq);

  builder.Build().Run();
testCases:
  - type: code-contains
    description: "Must add PostgreSQL with AddPostgres"
    value: "AddPostgres"
  - type: code-contains
    description: "Must add a database with AddDatabase"
    value: "AddDatabase"
  - type: code-contains
    description: "Must add Redis with AddRedis"
    value: "AddRedis"
  - type: code-contains
    description: "Must add RabbitMQ with AddRabbitMQ"
    value: "AddRabbitMQ"
  - type: code-contains
    description: "Must use WithReference to wire services"
    value: "WithReference"
  - type: code-contains
    description: "Must use WaitFor for startup ordering"
    value: "WaitFor"
  - type: code-contains
    description: "Must add a Vite frontend"
    value: "AddViteApp"
  - type: code-contains
    description: "Must add a Python ML service"
    value: "AddPythonApp"
hints:
  - "Start with infrastructure: AddPostgres, AddRedis, AddRabbitMQ"
  - "AddPostgres(\"pg\").AddDatabase(\"atlas-db\") creates a server and a database"
  - "Use .WithReference() to inject connection strings and .WaitFor() for startup ordering"
  - "AddViteApp(\"frontend\", \"../atlas-web\") adds a TypeScript/Vite frontend"
  - "AddPythonApp(\"ml\", \"../atlas-ml\", \"app:app\") adds a Python FastAPI service"
requiredPackages:
  - Aspire.Hosting.PostgreSQL
  - Aspire.Hosting.Redis
  - Aspire.Hosting.RabbitMQ
  - Aspire.Hosting.NodeJs
  - Aspire.Hosting.Python
