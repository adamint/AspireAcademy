solutionCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.ApplicationModel;

  public class FeatureFlagResource(string name) : ContainerResource(name), IResourceWithConnectionString
  {
      public EndpointReference HttpEndpoint => new(this, "http");

      public ReferenceExpression ConnectionStringExpression =>
          ReferenceExpression.Create($"{HttpEndpoint.Property(EndpointProperty.Url)}");
  }

  public static class FeatureFlagExtensions
  {
      public static IResourceBuilder<FeatureFlagResource> AddFeatureFlags(
          this IDistributedApplicationBuilder builder, string name)
      {
          return builder.AddResource(new FeatureFlagResource(name))
              .WithImage("ghcr.io/featureflags/service", "latest")
              .WithHttpEndpoint(targetPort: 8080, name: "http")
              .WithHealthCheck("feature-flags-health")
              .WithAnnotation(new ResourceIconAnnotation("Flag", IconVariant.Filled));
      }
  }

  var builder = DistributedApplication.CreateBuilder(args);

  builder.AddFeatureFlags("flags");

  builder.Build().Run();
