instructions: |
  # Boss Challenge — Feature Flag Service Integration

  Build a complete Aspire hosting integration for a feature flag service, including a custom resource class, extension method, dashboard icon, and health check.

  **What to do:**
  1. Create a `FeatureFlagResource` class that inherits from `ContainerResource` and implements `IResourceWithConnectionString`
  2. Expose an `EndpointReference` named `"http"` and implement `ConnectionStringExpression` using the endpoint URL
  3. Create a static `AddFeatureFlags` extension method on `IDistributedApplicationBuilder`
  4. Register the resource with an HTTP endpoint, icon annotation, and health check

  **Key concepts:**
  - Custom resources extend `ContainerResource` (for container-based services) or `Resource` (abstract)
  - `IResourceWithConnectionString` enables `WithReference()` to inject connection strings
  - `EndpointReference` and `ReferenceExpression.Create()` build dynamic connection strings
  - `ResourceIconAnnotation` controls the Dashboard icon
