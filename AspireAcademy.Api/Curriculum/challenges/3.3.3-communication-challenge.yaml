    type: code-contains
    expected: WithReference(postgres)
    description: Backend must reference the database resource
  - id: tc7
    name: Uses WaitFor ordering
    type: code-contains
    expected: WaitFor
    description: Must use WaitFor to control startup ordering
  - id: tc8
    name: Web has external endpoints
    type: code-contains
    expected: WithExternalHttpEndpoints
    description: Web frontend must have external HTTP endpoints
hints:
  - Start with builder.AddPostgres("postgres").AddDatabase("catalogdb") and store the database in a variable
  - Chain .WithReference(postgres) and .WaitFor(postgres) on the backend project
  - The API project should reference the backend, not the database directly
  - Don't forget .WithExternalHttpEndpoints() on the web frontend
