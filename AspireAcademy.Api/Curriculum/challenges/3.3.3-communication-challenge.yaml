instructions: |
  # Service Communication Challenge

  Build an AppHost that wires up service-to-service communication using references and startup ordering.

  **What to do:**
  1. Add a PostgreSQL server named `"postgres"` and a database named `"catalogdb"`
  2. Add a backend project named `"backend"` using `Projects.BackendService` that references the database
  3. Add an API project named `"api"` using `Projects.ApiService` that references the backend
  4. Use `WaitFor` so the backend waits for the database and the API waits for the backend
  5. Add a web frontend named `"web"` using `Projects.Web` that references the API with external HTTP endpoints

  **Key concepts:**
  - `WithReference(resource)` creates service discovery environment variables so services can find each other
  - `WaitFor(resource)` ensures a resource is healthy before the dependent starts
  - References form a dependency graph: web → api → backend → database
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add a PostgreSQL server and database

  // TODO: Add a backend project that references the database

  // TODO: Add an API project that references the backend

  // TODO: Add a web frontend that references the API with external endpoints

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("postgres")
                        .AddDatabase("catalogdb");

  var backend = builder.AddProject<Projects.BackendService>("backend")
                       .WithReference(postgres)
                       .WaitFor(postgres);

  var api = builder.AddProject<Projects.ApiService>("api")
                   .WithReference(backend)
                   .WaitFor(backend);

  builder.AddProject<Projects.Web>("web")
         .WithExternalHttpEndpoints()
         .WithReference(api)
         .WaitFor(api);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Compiles successfully
    type: compiles
    expected: null
    description: Code must compile without errors
  - id: tc2
