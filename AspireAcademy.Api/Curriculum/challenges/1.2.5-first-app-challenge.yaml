instructions: |
  # First App Challenge

  Build a complete AppHost that orchestrates two services with a shared Redis cache.

  **What to do:**
  1. Create a Redis cache named `"cache"`
  2. Add an API project named `"api"` using `Projects.ApiService` that references the cache
  3. Add a web frontend named `"web"` using `Projects.Web` that references the API
  4. Make the web frontend's HTTP endpoints externally accessible
  5. Use `WaitFor` to ensure the API starts after Redis, and the web starts after the API

  **Key concepts:**
  - `AddRedis(name)` registers a Redis container
  - `AddProject<T>(name)` registers a .NET project
  - `WithReference(resource)` injects connection strings or service discovery URLs
  - `WithExternalHttpEndpoints()` marks endpoints as externally accessible
  - `WaitFor(resource)` controls startup ordering
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add a Redis cache named "cache"

  // TODO: Add an API project that references the cache

  // TODO: Add a web frontend that references the API with external endpoints

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var cache = builder.AddRedis("cache");

  var api = builder.AddProject<Projects.ApiService>("api")
                   .WithReference(cache)
                   .WaitFor(cache);

  builder.AddProject<Projects.Web>("web")
         .WithExternalHttpEndpoints()
         .WithReference(api)
         .WaitFor(api);

  builder.Build().Run();
