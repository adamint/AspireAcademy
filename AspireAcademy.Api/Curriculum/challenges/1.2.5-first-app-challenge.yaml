hints:
  - Start by adding Redis with builder.AddRedis("cache") and storing it in a variable
  - Chain .WithReference(cache) and .WaitFor(cache) on the API project builder
  - Use .WithExternalHttpEndpoints() on the web project so it's accessible from your browser
