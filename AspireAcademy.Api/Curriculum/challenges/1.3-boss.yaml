instructions: |
  # Boss Challenge: Create a Custom Resource

  In this challenge, you'll go beyond built-in resource types and create your own custom resource class. This is how Aspire hosting integrations work internally — they define resource classes that extend `Resource` and register them with the AppHost.

  **What to do:**
  1. Define a class `MailDevResource` that extends `Resource` and implements `IResourceWithEndpoints`
  2. The class should accept a `name` parameter and pass it to the base constructor
  3. Add a public property `SmtpEndpoint` of type `EndpointReference` that returns the endpoint named `"smtp"`
  4. Register the resource in the AppHost using `builder.CreateResourceBuilder(new MailDevResource("maildev"))`
  5. Chain `.WithEndpoint(port: 1025, name: "smtp")` to configure the SMTP port

  **Key concepts:**
  - Custom resources extend `Resource` (the abstract base class)
  - `IResourceWithEndpoints` marks a resource as having network endpoints
  - `CreateResourceBuilder(resource)` registers a pre-created resource object with the builder
  - `GetEndpoint(name)` returns an `EndpointReference` for a named endpoint
starterCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.ApplicationModel;

  // TODO: Define the MailDevResource class
