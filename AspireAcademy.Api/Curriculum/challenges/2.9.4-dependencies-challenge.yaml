instructions: |
  # Resource Dependencies with WaitFor

  Control startup ordering so services don't try to connect before their dependencies are ready.

  **Your task:**
  1. Add PostgreSQL `"postgres"` with database `"appdb"`
  2. Add Redis `"cache"`
  3. Add RabbitMQ `"messaging"`
  4. Add project `"api"` that:
     - References `appdb`, `cache`, and `messaging`
     - WaitFor `postgres`, `cache`, and `messaging`
  5. Add project `"worker"` that:
     - References `messaging` only
     - WaitFor `messaging`
  6. Add project `"web"` that:
     - References `api` only
     - WaitFor `api` (cascading dependency)

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add PostgreSQL with database "appdb"
  // TODO: Add Redis "cache"
  // TODO: Add RabbitMQ "messaging"

  // TODO: Add "api" project with all references and wait conditions
  // TODO: Add "worker" project depending on messaging
  // TODO: Add "web" project depending on api

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("postgres");
  var appdb = postgres.AddDatabase("appdb");
  var cache = builder.AddRedis("cache");
  var messaging = builder.AddRabbitMQ("messaging");

  var api = builder.AddProject("api")
      .WithReference(appdb)
      .WithReference(cache)
      .WithReference(messaging)
      .WaitFor(postgres)
      .WaitFor(cache)
      .WaitFor(messaging);

  builder.AddProject("worker")
      .WithReference(messaging)
      .WaitFor(messaging);

  builder.AddProject("web")
      .WithReference(api)
      .WaitFor(api);

  builder.Build().Run();

