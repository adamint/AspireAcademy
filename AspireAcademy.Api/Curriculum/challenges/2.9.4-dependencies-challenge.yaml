    type: code-pattern
    expected: 'AddProject.*"api"[\s\S]*AddProject.*"worker"[\s\S]*AddProject.*"web"'
    description: Must add api, worker, and web projects
  - id: tc8
    name: Web depends on API
    type: code-pattern
    expected: 'AddProject.*"web"[\s\S]*WaitFor\(api\)'
    description: Web must wait for API (cascading dependency)
  - id: tc9
    name: Uses WithReference
    type: code-contains
    expected: WithReference
    description: Must connect resources with WithReference

hints:
  - "WaitFor prevents a resource from starting until its dependency is healthy"
  - "Web only needs to reference the API - the API handles database/cache access"
  - "Create all infrastructure resources first, then the projects that use them"

