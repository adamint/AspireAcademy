instructions: |
  Configure every Bazaar resource with proper endpoints, environment variables, parameters, and lifetimes.

  **Your tasks:**
  1. PostgreSQL `"pg"` with persistent lifetime and database `"bazaar-db"`
  2. Redis `"cache"` with persistent lifetime
  3. RabbitMQ `"messaging"`
  4. A secret parameter `"api-key"`
  5. C# API `"api"` referencing all infrastructure, with the API key injected as env var `"API_KEY"`
  6. Python ML `"ml"` at `"../bazaar-recs"` with HTTP endpoint on port 8000, referencing rabbitmq
  7. Go worker `"worker"` as executable referencing rabbitmq
  8. Vite frontend `"frontend"` at `"../bazaar-web"` referencing the API
  9. Proper `WaitFor` dependencies on all services
starterCode: 'var builder = DistributedApplication.CreateBuilder(args);


  // Configure all Bazaar resources with correct endpoints, environment variables, and parameters

  // 1. PostgreSQL "pg" with database "bazaar-db" and persistent lifetime

  // 2. Redis "cache" with persistent lifetime

  // 3. RabbitMQ "messaging"

  // 4. API key parameter "api-key" (secret)

  // 5. C# API "api" referencing pg, redis, rabbitmq, with the API key as env var

  // 6. Python ML "ml" at "../bazaar-recs" with HTTP endpoint on 8000 referencing rabbitmq

  // 7. Go worker "worker" as executable referencing rabbitmq

  // 8. Vite frontend "frontend" at "../bazaar-web" referencing api


  builder.Build().Run();'
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\")\n    .WithLifetime(ContainerLifetime.Persistent)\n    .AddDatabase(\"bazaar-db\");\n\
  var redis = builder.AddRedis(\"cache\")\n    .WithLifetime(ContainerLifetime.Persistent);\nvar rabbitmq = builder.AddRabbitMQ(\"messaging\");\nvar apiKey = builder.AddParameter(\"api-key\", secret: true);\n\
  \nvar api = builder.AddProject<Projects.BazaarApi>(\"api\")\n    .WithReference(postgres)\n    .WithReference(redis)\n    .WithReference(rabbitmq)\n    .WithEnvironment(\"API_KEY\", apiKey)\n    .WaitFor(postgres)\n\
  \    .WaitFor(redis);\n\nbuilder.AddPythonApp(\"ml\", \"../bazaar-recs\", \"app:app\")\n    .WithHttpEndpoint(port: 8000, env: \"PORT\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nbuilder.AddExecutable(\"\
  worker\", \"go\", \"../bazaar-worker\", \"run\", \".\")\n    .WithReference(rabbitmq)\n    .WaitFor(rabbitmq);\n\nbuilder.AddViteApp(\"frontend\", \"../bazaar-web\")\n    .WithReference(api)\n    .WaitFor(api);\n\
  \nbuilder.Build().Run();"
