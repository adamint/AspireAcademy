hints:
- 'Start with infrastructure: AddPostgres, AddRedis, AddRabbitMQ'
- Use .WithLifetime(ContainerLifetime.Persistent) on databases/caches
- 'AddParameter("api-key", secret: true) creates a secret parameter'
- Use .WithEnvironment("API_KEY", apiKey) to inject the parameter
- Chain WaitFor on services that depend on infrastructure
requiredPackages:
- Aspire.Hosting.PostgreSQL
- Aspire.Hosting.Redis
- Aspire.Hosting.RabbitMQ
- Aspire.Hosting.Python
- Aspire.Hosting.NodeJs
