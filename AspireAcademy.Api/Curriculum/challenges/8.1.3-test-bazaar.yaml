instructions: |
  Write an integration test for the Bazaar API using `DistributedApplicationTestingBuilder`.

  **Your tasks:**
  1. Create an AppHost using `DistributedApplicationTestingBuilder.CreateAsync<Projects.BazaarAppHost>()`
  2. Build and start the application in `InitializeAsync()`
  3. Wait for the `"api"` resource to be running
  4. Get an `HttpClient` for the API using `_app.CreateHttpClient("api")`
  5. Test that `GET /health` returns 200 OK
  6. Properly dispose the app in `DisposeAsync()`
starterCode: "// Write an integration test that:\n// 1. Creates an AppHost using DistributedApplicationTestingBuilder\n// 2. Starts the application\n// 3. Gets an HttpClient for the \"api\" resource\n//\
  \ 4. Calls GET /health and asserts 200 OK\n// 5. Calls GET /api/search?q=test and asserts a valid response\n\npublic class BazaarApiTests : IAsyncLifetime\n{\n    private DistributedApplication _app =\
  \ null!;\n\n    public async Task InitializeAsync()\n    {\n        // TODO: Create and start the app\n    }\n\n    public async Task DisposeAsync()\n    {\n        // TODO: Clean up\n    }\n\n    [Fact]\n\
  \    public async Task HealthEndpointReturns200()\n    {\n        // TODO: Test health endpoint\n    }\n}"
solutionCode: "public class BazaarApiTests : IAsyncLifetime\n{\n    private DistributedApplication _app = null!;\n\n    public async Task InitializeAsync()\n    {\n        var builder = await DistributedApplicationTestingBuilder\n\
  \            .CreateAsync<Projects.BazaarAppHost>();\n        _app = await builder.BuildAsync();\n        await _app.StartAsync();\n\n        var rns = _app.Services.GetRequiredService<ResourceNotificationService>();\n\
  \        await rns.WaitForResourceAsync(\"api\", KnownResourceStates.Running);\n    }\n\n    public async Task DisposeAsync()\n    {\n        await _app.DisposeAsync();\n    }\n\n    [Fact]\n    public\
  \ async Task HealthEndpointReturns200()\n    {\n        var client = _app.CreateHttpClient(\"api\");\n        var response = await client.GetAsync(\"/health\");\n        response.StatusCode.Should().Be(HttpStatusCode.OK);\n\
  \    }\n}"
