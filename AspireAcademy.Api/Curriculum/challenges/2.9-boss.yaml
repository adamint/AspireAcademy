instructions: |
  # 🏰 Boss Challenge: Complete Polyglot AppHost

  Build a full polyglot application with .NET projects, infrastructure, and proper dependency ordering.

  **Your task:**
  1. Add PostgreSQL `"postgres"` with a data volume `"pg-data"` and databases `"catalogdb"` and `"identitydb"`
  2. Add Redis `"cache"` with a data volume `"redis-data"`
  3. Add a parameter `"api-key"` as a secret
  4. Add project `"identity"` referencing `identitydb`
  5. Add project `"catalog"` referencing `catalogdb`, `cache`, and `identity`, waiting for all dependencies
  6. Add project `"gateway"` referencing `catalog` and `identity`, with external HTTP endpoints, waiting for both

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Infrastructure - PostgreSQL (with 2 databases), Redis, secret parameter

  // TODO: Identity service - references identity database

  // TODO: Catalog service - references catalog database, cache, and identity service

  // TODO: Gateway - references catalog and identity, externally accessible

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("postgres").WithDataVolume("pg-data");
  var catalogdb = postgres.AddDatabase("catalogdb");
  var identitydb = postgres.AddDatabase("identitydb");
  var cache = builder.AddRedis("cache").WithDataVolume("redis-data");
  var apiKey = builder.AddParameter("api-key", secret: true);

  var identity = builder.AddProject("identity")
      .WithReference(identitydb)
      .WaitFor(postgres);

  var catalog = builder.AddProject("catalog")
      .WithReference(catalogdb)
      .WithReference(cache)
      .WithReference(identity)
      .WaitFor(postgres)
      .WaitFor(cache)
      .WaitFor(identity);

  builder.AddProject("gateway")
      .WithReference(catalog)
      .WithReference(identity)
      .WaitFor(catalog)
      .WaitFor(identity)
      .WithExternalHttpEndpoints();

  builder.Build().Run();

