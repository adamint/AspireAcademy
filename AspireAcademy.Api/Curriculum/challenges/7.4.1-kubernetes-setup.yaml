instructions: |
  # Configure Kubernetes Publishing

  Set up an AppHost that publishes to Kubernetes with customized Helm chart metadata and a PostgreSQL database with a project consuming it.

  **What to do:**
  1. Add a Kubernetes environment named `"k8s"`
  2. Add a PostgreSQL server named `"pg"` with a database named `"catalog"`
  3. Add a project named `"api"` that references the catalog database
  4. Customize the API to use `LoadBalancer` service type in Kubernetes

  **Key concepts:**
  - `AddKubernetesEnvironment` sets up Helm chart generation
  - `PublishAsKubernetesService` customizes per-resource Kubernetes output
  - Database resources become StatefulSets; project resources become Deployments
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Kubernetes environment named "k8s"
  // TODO: Add PostgreSQL server "pg" with database "catalog"
  // TODO: Add project "api" referencing catalog, published as LoadBalancer

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  builder.AddKubernetesEnvironment("k8s");

  var catalog = builder.AddPostgres("pg").AddDatabase("catalog");

  builder.AddProject<Projects.Api>("api")
      .WithReference(catalog)
      .PublishAsKubernetesService<ProjectResource>(k8s =>
      {
          k8s.Service.Spec.Type = "LoadBalancer";
      });

  builder.Build().Run();
testCases:
  - id: tc1
    name: Compiles successfully
    type: compiles
    expected: null
    description: Code must compile without errors
  - id: tc2
    name: Adds Kubernetes environment
    type: code-contains
    expected: AddKubernetesEnvironment
    description: Must register a Kubernetes publishing environment
  - id: tc3
    name: Adds PostgreSQL server
    type: code-contains
    expected: AddPostgres("pg")
    description: Must add a PostgreSQL server named 'pg'
  - id: tc4
    name: Adds catalog database
    type: code-contains
    expected: AddDatabase("catalog")
    description: Must add a 'catalog' database
  - id: tc5
    name: Customizes Kubernetes service type
    type: code-contains
    expected: PublishAsKubernetesService
    description: Must customize the Kubernetes output for the API
  - id: tc6
    name: Sets LoadBalancer type
    type: code-contains
    expected: LoadBalancer
    description: Service type must be set to LoadBalancer
hints:
  - "Use builder.AddKubernetesEnvironment(\"k8s\") to register the environment"
  - "Chain AddPostgres(\"pg\").AddDatabase(\"catalog\") for the two-tier database pattern"
  - "Use PublishAsKubernetesService<ProjectResource>(k8s => { ... }) to customize the Kubernetes output"
requiredPackages:
