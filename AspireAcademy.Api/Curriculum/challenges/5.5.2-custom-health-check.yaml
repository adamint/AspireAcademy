hints:
  - Chain .AddCheck("self", ...) directly on the AddHealthChecks() call
  - The lambda for AddCheck should return HealthCheckResult.Healthy("OK")
  - Map /health first with no filtering to include all checks
  - For /alive, pass HealthCheckOptions with a Predicate that checks for the "live" tag
