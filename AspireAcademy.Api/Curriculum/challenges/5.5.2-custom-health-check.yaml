instructions: |
  # Custom Health Check Challenge

  Write a service that registers health checks including a custom inline check, and maps both liveness and readiness endpoints.

  **What to do:**
  1. Add health checks with `builder.Services.AddHealthChecks()`
  2. Add a custom health check named `"self"` using `AddCheck` with a lambda that returns `HealthCheckResult.Healthy("OK")`
  3. Map a readiness endpoint at `"/health"` that runs all health checks
  4. Map a liveness endpoint at `"/alive"` that filters to checks tagged `"live"` using a predicate

  **Key concepts:**
  - `AddHealthChecks()` registers the health check services in DI
  - `AddCheck(name, () => HealthCheckResult.Healthy())` adds an inline custom health check
  - `MapHealthChecks(path)` exposes health results at an endpoint
  - Health check predicates can filter which checks run on which endpoint
starterCode: |
  using Microsoft.Extensions.Diagnostics.HealthChecks;

  var builder = WebApplication.CreateBuilder(args);

  // TODO: Add health checks and a custom check named "self"

  var app = builder.Build();

  // TODO: Map a readiness endpoint at "/health"

  // TODO: Map a liveness endpoint at "/alive" filtered to "live" tag

  app.Run();
solutionCode: |
  using Microsoft.Extensions.Diagnostics.HealthChecks;

  var builder = WebApplication.CreateBuilder(args);

  builder.Services.AddHealthChecks()
      .AddCheck("self", () => HealthCheckResult.Healthy("OK"));

  var app = builder.Build();

  app.MapHealthChecks("/health");

  app.MapHealthChecks("/alive", new Microsoft.AspNetCore.Diagnostics.HealthChecks.HealthCheckOptions
  {
      Predicate = check => check.Tags.Contains("live")
  });

  app.Run();
