instructions: |
  # Aspire Architect Certification

  Build CloudMarket — a complete multi-service e-commerce platform.

  **What to do:**
  1. Add PostgreSQL with a `"catalogdb"` database
  2. Add Redis as `"cache"`
  3. Add RabbitMQ as `"messaging"`
  4. Add project `"catalog-api"` referencing the database and cache
  5. Add project `"order-api"` referencing the database and messaging
  6. Add project `"webfrontend"` referencing both APIs
  7. Use `WaitFor` to establish proper startup ordering

  **Key concepts:**
  - Combine databases, caches, and message brokers in one AppHost
  - Use `WithReference` to wire dependencies
  - Use `WaitFor` to control startup order
  - Each service gets exactly the infrastructure connections it needs
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // === STEP 1: Infrastructure Resources ===
  // TODO: Add PostgreSQL with "catalogdb" database
  // TODO: Add Redis as "cache"
  // TODO: Add RabbitMQ as "messaging"

  // === STEP 2: Service Projects ===
  // TODO: Add CatalogApi referencing db and cache
  // TODO: Add OrderApi referencing db and messaging
  // TODO: Add WebFrontend referencing both APIs

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var catalogdb = builder.AddPostgres("pg")
      .WithDataVolume()
      .AddDatabase("catalogdb");

  var cache = builder.AddRedis("cache");
  var messaging = builder.AddRabbitMQ("messaging");

  var catalogApi = builder.AddProject<Projects.CatalogApi>("catalog-api")
      .WithReference(catalogdb)
      .WithReference(cache)
      .WaitFor(catalogdb)
      .WaitFor(cache);

  var orderApi = builder.AddProject<Projects.OrderApi>("order-api")
      .WithReference(catalogdb)
      .WithReference(messaging)
      .WaitFor(catalogdb)
      .WaitFor(messaging);

  builder.AddProject<Projects.WebFrontend>("webfrontend")
      .WithReference(catalogApi)
      .WithReference(orderApi)
      .WaitFor(catalogApi)
      .WaitFor(orderApi);

  builder.Build().Run();
