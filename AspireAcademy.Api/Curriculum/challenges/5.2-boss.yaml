instructions: |
  # Multi-Database Service

  Build a service that connects to both PostgreSQL (via EF Core) and MongoDB, then create a sync endpoint that reads from one and writes to the other.

  **What to do:**
  1. Register an EF Core PostgreSQL `DbContext` named `CatalogContext` for connection `"catalogdb"`
  2. Register a MongoDB client for connection `"mongodb"`
  3. Implement the `/sync` endpoint that reads products from PostgreSQL and writes them to MongoDB

  **Key concepts:**
  - `AddNpgsqlDbContext<T>(connectionName)` registers an EF Core context
  - `AddMongoDBClient(connectionName)` registers an `IMongoClient`
  - Both integrations automatically configure health checks and telemetry
