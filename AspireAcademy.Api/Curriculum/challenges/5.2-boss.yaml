title: "Multi-Database Service"
description: "Build a service that connects to both PostgreSQL (via EF Core) and MongoDB, then create a sync endpoint that reads from one and writes to the other."
starterCode: |
  var builder = WebApplication.CreateBuilder(args);

  // TODO: Register EF Core PostgreSQL DbContext for "catalogdb"
  // TODO: Register MongoDB client for "mongodb"

  var app = builder.Build();

  app.MapGet("/sync", async (CatalogContext db, IMongoClient mongo) =>
  {
      // TODO: Read all products from PostgreSQL
      // TODO: Write them to MongoDB collection "products" in database "catalog"
      return Results.Ok("Synced");
  });

  app.Run();
tests:
  - description: "CatalogContext is resolvable from DI"
  - description: "IMongoClient is resolvable from DI"
  - description: "/sync endpoint returns 200 OK"
  - description: "Health checks are enabled for both integrations"
hints:
  - "Use builder.AddNpgsqlDbContext<CatalogContext>(\"catalogdb\") to register the EF Core context"
  - "Use builder.AddMongoDBClient(\"mongodb\") to register the MongoDB client"
  - "Get a MongoDB collection via mongo.GetDatabase(\"catalog\").GetCollection<Product>(\"products\")"
  - "Use await db.Products.ToListAsync() to read from PostgreSQL"
  - "Use await collection.InsertManyAsync(products) to write to MongoDB"
