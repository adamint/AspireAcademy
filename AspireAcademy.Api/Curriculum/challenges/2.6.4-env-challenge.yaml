instructions: |
  Wire an API with a composed database connection string, a cache URL from an endpoint, and a static feature flag.

  1. A Redis container and parameter resources are already defined.
  2. Add an API project.
  3. Set `"CACHE_URL"` from the Redis endpoint reference.
  4. Set `"DB_CONNECTION"` using `ReferenceExpression.Create()` composing `dbHost` and `dbPass`.
  5. Set `"FEATURE_X"` to the static string `"enabled"`.
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var redis = builder.AddContainer("cache", "redis:7")
      .WithEndpoint(targetPort: 6379, scheme: "tcp", name: "redis");

  var dbHost = builder.AddParameter("db-host");
  var dbPass = builder.AddParameter("db-pass", secret: true);

  // TODO: Add API project
