hints:
  - 'Start with infrastructure — add PostgreSQL, Redis, and RabbitMQ first, then layer on databases and tooling'
  - Use .WithDataVolume() on both PostgreSQL and Redis for persistent storage
  - Chain .WithPgAdmin() on the PostgreSQL builder and .WithRedisCommander() on the Redis builder
  - 'Add the Seq container with builder.AddContainer("seq", "datalust/seq") and configure its endpoint and EULA variable'
  - 'Wire up projects in dependency order — users-api first, then orders-api (which depends on users-api), then gateway last'
  - Use WaitFor on each project to ensure dependencies are ready before the project starts
