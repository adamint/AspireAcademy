instructions: |
  # Boss: Advanced Aspire Mastery

  Build a comprehensive AppHost that demonstrates mastery of all advanced Aspire concepts. This challenge brings together databases, caching, messaging, custom containers, secrets, service references, and startup ordering.

  **What to do:**
  1. Add a PostgreSQL server named `"postgres"` with a data volume, PgAdmin, and two databases: `"usersdb"` and `"ordersdb"`
  2. Add a Redis cache named `"cache"` with a data volume and Redis Commander
  3. Add a RabbitMQ resource named `"messaging"`
  4. Add a secret parameter named `"jwt-secret"`
  5. Add a container named `"seq"` using the `"datalust/seq"` image with an HTTP endpoint on port 80 and environment variable `ACCEPT_EULA` set to `Y`
  6. Add a project `"users-api"` referencing `usersdb` and `cache`, waiting for both
  7. Add a project `"orders-api"` referencing `ordersdb`, `messaging`, and `users-api`, waiting for all three
  8. Add a project `"gateway"` referencing both APIs with external HTTP endpoints, waiting for both

  **Key concepts:**
  - `AddPostgres(name).WithDataVolume().WithPgAdmin()` for PostgreSQL with tooling
  - `.AddDatabase(name)` to create named databases on a server
  - `AddRedis(name).WithDataVolume().WithRedisCommander()` for Redis with tooling
  - `AddRabbitMQ(name)` for message broker resources
  - `AddParameter(name, secret: true)` for secret parameters
  - `AddContainer(name, image)` with `WithHttpEndpoint` and `WithEnvironment` for custom containers
  - `WithReference`, `WaitFor`, and `WithExternalHttpEndpoints` for wiring it all together
