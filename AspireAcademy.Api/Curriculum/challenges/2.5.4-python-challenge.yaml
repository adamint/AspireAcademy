instructions: |
  # Adding Python Applications

  Aspire can orchestrate Python applications alongside your .NET services.

  **Your task:**
  1. Create the AppHost builder (provided)
  2. Add PostgreSQL named `"postgres"` with a database named `"analyticsdb"`
  3. Add a Python app named `"analytics"` from path `"../analytics-service"` with entrypoint `"main.py"` using `AddPythonApp("analytics", "../analytics-service", "main.py")`
  4. Chain `.WithReference(analyticsdb)` to give Python access to the database
  5. Chain `.WithArgs("--workers", "4")` to pass command-line arguments

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add PostgreSQL with an "analyticsdb" database

  // TODO: Add Python app "analytics" from "../analytics-service" with entrypoint "main.py"
  //   - References the database
  //   - Passes arguments: --workers 4

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("postgres");
  var analyticsdb = postgres.AddDatabase("analyticsdb");

  builder.AddPythonApp("analytics", "../analytics-service", "main.py")
      .WithReference(analyticsdb)
      .WithArgs("--workers", "4");

  builder.Build().Run();

