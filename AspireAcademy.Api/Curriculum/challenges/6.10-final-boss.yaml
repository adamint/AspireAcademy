instructions: |
  # Aspire Architect — Internals Edition

  Diagnose a broken custom hosting integration using Aspire internals knowledge. The container starts but the connection string doesn't resolve, health checks never report healthy, and the dashboard shows no endpoints. Use your knowledge of DcpExecutor, ExpressionResolver, and ResourceNotificationService to identify and fix ALL issues.

  **Bugs to fix:**
  1. Missing `WithEndpoint()` — DcpExecutor needs an EndpointAnnotation to allocate ports
  2. `ConnectionStringExpression` references endpoint `"redis"` but no EndpointAnnotation exists with that name
  3. No health check is wired — ResourceNotificationService never transitions to healthy state

  **What to do:**
  1. Add `.WithEndpoint("redis", ...)` with port 6379 to create the EndpointAnnotation
  2. Add `.WithHealthCheck("redis-health")` to wire health monitoring
  3. Keep the ConnectionStringExpression using the `"redis"` endpoint reference
starterCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.ApplicationModel;

  public class BrokenCacheResource(string name) : ContainerResource(name), IResourceWithConnectionString
  {
      public ReferenceExpression ConnectionStringExpression =>
          ReferenceExpression.Create($"{new EndpointReference(this, "redis").Property(EndpointProperty.Url)}");
  }

  public static class BrokenCacheExtensions
  {
      public static IResourceBuilder<BrokenCacheResource> AddBrokenCache(
          this IDistributedApplicationBuilder builder, string name)
      {
          return builder.AddResource(new BrokenCacheResource(name))
              .WithImage("redis", "7.4")
              // BUG: No .WithEndpoint() — no port mappings
              // BUG: No .WithHealthCheck() — stays Starting forever
              .WithAnnotation(new ResourceIconAnnotation("Storage", IconVariant.Regular));
      }
  }

  var builder = DistributedApplication.CreateBuilder(args);
  builder.AddBrokenCache("cache");
  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;
  using Aspire.Hosting.ApplicationModel;

  public class FixedCacheResource(string name) : ContainerResource(name), IResourceWithConnectionString
  {
      public ReferenceExpression ConnectionStringExpression =>
          ReferenceExpression.Create($"{new EndpointReference(this, "redis").Property(EndpointProperty.Url)}");
  }

  public static class FixedCacheExtensions
  {
      public static IResourceBuilder<FixedCacheResource> AddFixedCache(
          this IDistributedApplicationBuilder builder, string name)
      {
          return builder.AddResource(new FixedCacheResource(name))
              .WithImage("redis", "7.4")
              .WithEndpoint("redis", e =>
              {
                  e.Port = 6379;
                  e.TargetPort = 6379;
                  e.Scheme = "tcp";
              })
              .WithHealthCheck("redis-health")
              .WithAnnotation(new ResourceIconAnnotation("Storage", IconVariant.Regular));
      }
  }

  var builder = DistributedApplication.CreateBuilder(args);
  builder.AddFixedCache("cache");
  builder.Build().Run();
testCases:
  - id: tc1
    name: "Compiles successfully"
    type: compiles
    expected: null
    description: "Code must compile without errors"
  - id: tc2
    name: "Has WithEndpoint for redis"
    type: code-contains
    expected: "WithEndpoint"
    description: "Code must add a WithEndpoint call to create the EndpointAnnotation for port allocation"
  - id: tc3
    name: "Configures port 6379"
    type: code-contains
    expected: "6379"
    description: "The endpoint must configure port 6379 for Redis"
  - id: tc4
    name: "Has health check"
    type: code-contains
    expected: "WithHealthCheck"
    description: "Code must wire a health check so ResourceNotificationService can report healthy state"
  - id: tc5
    name: "Implements IResourceWithConnectionString"
    type: code-contains
    expected: "IResourceWithConnectionString"
    description: "Resource must implement IResourceWithConnectionString for connection string resolution"
  - id: tc6
    name: "Uses ReferenceExpression"
    type: code-contains
    expected: "ReferenceExpression.Create"
    description: "ConnectionStringExpression must use ReferenceExpression.Create for ExpressionResolver"
hints:
  - "DcpExecutor.CreateContainerAsync() reads EndpointAnnotation to build container port mappings. No annotation = no ports."
  - "Add .WithEndpoint('redis', e => { e.Port = 6379; e.TargetPort = 6379; }) to create the EndpointAnnotation."
  - "ExpressionResolver.EvalExpressionAsync() resolves EndpointReference only if a matching EndpointAnnotation exists."
  - "ResourceNotificationService.PublishUpdateAsync() updates HealthStatus from health check results. No health check = stuck in Starting."
  - "Add .WithHealthCheck('redis-health') to wire up health monitoring."
requiredPackages:
  - "Aspire.Hosting"
sortOrder: 0
