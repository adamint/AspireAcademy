instructions: |
  # Boss Challenge: AI-Powered Secure Application

  Build an AppHost for an AI-powered application combining identity management, vector search, language models, and structured logging.

  **Architecture:**
  - **Keycloak** for authentication with a pre-configured realm
  - **Qdrant** for vector similarity search
  - **OpenAI** for chat completions with a specific model
  - **Seq** for centralized structured logging

  **What to do:**
  1. Add Keycloak named `"idp"` with `WithRealmImport("./realms")` and `WithDataVolume()`
  2. Add Qdrant named `"vectors"` with `WithDataVolume()`
  3. Add OpenAI named `"openai"` and add a model `"chat"` using `"gpt-4o"`
  4. Add Seq named `"seq"` with `WithDataVolume()`
  5. Add project `"ai-api"` referencing Keycloak, Qdrant, the OpenAI chat model, and Seq

  **Key concepts:**
  - OpenAI is a connection resource, not a container — reference the model, not the parent
  - Keycloak realm import pre-configures clients, users, and roles
  - Qdrant auto-generates an API key for authentication
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Keycloak "idp" with realm import from "./realms" and data volume
  // TODO: Add Qdrant "vectors" with data volume
