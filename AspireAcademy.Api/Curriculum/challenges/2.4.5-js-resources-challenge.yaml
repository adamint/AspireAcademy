    expected: WithExternalHttpEndpoints
    description: Must expose frontend externally

hints:
  - "AddNodeApp takes three arguments: name, directory path, and script path"
  - "WithHttpEndpoint(env: \"PORT\") lets the Node.js app pick up the assigned port"
  - "Store the API in a variable so you can pass it to WithReference"

