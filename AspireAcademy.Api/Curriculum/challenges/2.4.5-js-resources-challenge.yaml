instructions: |
  # Adding JavaScript Resources

  Aspire can orchestrate Node.js and Vite applications alongside .NET services.
  Use `AddNodeApp` for general Node.js apps or `AddViteApp` for Vite-based frontends.

  **Your task:**
  1. Create the AppHost builder (provided)
  2. Add a .NET project named `"api"` using `AddProject("api")`
  3. Add a Node.js app named `"frontend"` from path `"../frontend"` with script `"server.js"` using `AddNodeApp("frontend", "../frontend", "server.js")`
  4. Chain `.WithReference(api)` so the frontend can discover the API
  5. Chain `.WithHttpEndpoint(env: "PORT")` to let the app use the assigned port
  6. Chain `.WithExternalHttpEndpoints()` to expose the frontend externally

  **Note:** Aspire provides two JavaScript hosting methods:
  - `AddNodeApp(name, directory, scriptPath)` — runs a Node.js script
  - `AddViteApp(name, directory, runScript)` — runs a Vite dev server

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add an API project named "api"

  // TODO: Add a Node.js frontend app that references the API
  //   - Named "frontend", path "../frontend", script "server.js"
  //   - References the API
  //   - HTTP endpoint with env var PORT
  //   - External HTTP endpoints

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var api = builder.AddProject("api");

  builder.AddNodeApp("frontend", "../frontend", "server.js")
      .WithReference(api)
      .WithHttpEndpoint(env: "PORT")
      .WithExternalHttpEndpoints();

  builder.Build().Run();

testCases:
