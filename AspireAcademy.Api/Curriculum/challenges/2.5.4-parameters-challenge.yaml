instructions: |
  Create an AppHost with a generated-default database password and a secret API key. Pass both to a project via environment variables.

  1. Add a secret parameter `"db-password"` with a generated default (min 16 chars, upper + lower + numeric).
  2. Add a secret parameter `"api-key"` (no default — will be prompted or configured).
  3. Add an API project with `DB_PASSWORD` and `API_KEY` environment variables from the parameters.
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add a secret parameter "db-password" with a generated default
  // TODO: Add a secret parameter "api-key"
  // TODO: Add a project with DB_PASSWORD and API_KEY env vars

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var dbPassword = builder.AddParameter("db-password", new GenerateParameterDefault
  {
      MinLength = 16,
      Lower = true,
      Upper = true,
      Numeric = true,
      Special = false,
      MinLower = 1,
      MinUpper = 1,
      MinNumeric = 1
  }, secret: true);

  var apiKey = builder.AddParameter("api-key", secret: true);

  builder.AddProject<Projects.ApiService>("api")
      .WithEnvironment("DB_PASSWORD", dbPassword)
      .WithEnvironment("API_KEY", apiKey);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Code compiles
    type: compiles
    expected: null
    description: The AppHost code must compile without errors.
  - id: tc2
    name: db-password is secret
    type: code-contains
    expected: 'secret: true'
    description: Both parameters should be marked as secrets.
  - id: tc3
    name: Generated default used
    type: code-contains
    expected: GenerateParameterDefault
    description: The db-password should use GenerateParameterDefault.
  - id: tc4
    name: API has DB_PASSWORD
    type: code-contains
    expected: WithEnvironment("DB_PASSWORD"
    description: The API should have DB_PASSWORD environment variable.
  - id: tc5
    name: API has API_KEY
    type: code-contains
    expected: WithEnvironment("API_KEY"
    description: The API should have API_KEY environment variable.
hints:
  - 'Use `AddParameter("db-password", new GenerateParameterDefault { MinLength = 16, ... }, secret: true)`.'
  - '`GenerateParameterDefault` properties: `MinLength`, `Lower`, `Upper`, `Numeric`, `Special`.'
  - 'Use `AddParameter("api-key", secret: true)` for the API key without a default.'
  - 'Pass parameters to `WithEnvironment()`: `.WithEnvironment("DB_PASSWORD", dbPassword)`.'
requiredPackages:
  - Aspire.Hosting
  - Aspire.Hosting.AppHost
sortOrder: 0
