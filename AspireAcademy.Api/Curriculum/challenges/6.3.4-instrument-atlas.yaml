hints:
- AddServiceDefaults() registers OpenTelemetry, health checks, service discovery, and resilience
- Use .AddUrlGroup() to add an HTTP health check for an external service
- MapDefaultEndpoints() maps /health and /alive endpoints
- Create an ActivitySource and use StartActivity to create spans
- Use IMeterFactory to create meters and counters
