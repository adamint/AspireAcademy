instructions: |
  Add full observability instrumentation to the Atlas API.

  **Your tasks:**
  1. Call `AddServiceDefaults()` to register OpenTelemetry, health checks, service discovery, and resilience
  2. Add a custom health check for the ML service using `.AddUrlGroup()`
  3. Map default health endpoints with `MapDefaultEndpoints()`
  4. Create a custom `ActivitySource` and use `StartActivity()` to create spans for search requests
  5. Create a custom `Counter` metric to track search request counts
starterCode: '// In your Atlas API Program.cs, add:

  // 1. ServiceDefaults with AddServiceDefaults()

  // 2. A custom health check for the ML service

  // 3. A custom ActivitySource and a span for search requests

  // 4. A custom Counter metric for search requests


  var builder = WebApplication.CreateBuilder(args);


  // TODO: Add service defaults

  // TODO: Add custom health check

  // TODO: Create metrics


  var app = builder.Build();


  // TODO: Map health endpoints

  // TODO: Add search endpoint with custom tracing and metrics


  app.Run();'
solutionCode: "var builder = WebApplication.CreateBuilder(args);\n\nbuilder.AddServiceDefaults();\n\nbuilder.Services.AddHealthChecks()\n    .AddUrlGroup(new Uri(\"http://ml/health\"), \"ml-service\");\n\
  \nvar app = builder.Build();\n\napp.MapDefaultEndpoints();\n\nvar searchSource = new ActivitySource(\"Atlas.Api.Search\");\nvar searchCounter = app.Services.GetRequiredService<IMeterFactory>()\n    .Create(\"\
  Atlas.Api\").CreateCounter<long>(\"atlas.search.requests\");\n\napp.MapGet(\"/search\", async (string query) =>\n{\n    using var activity = searchSource.StartActivity(\"SearchArticles\");\n    activity?.SetTag(\"\
  search.query\", query);\n    searchCounter.Add(1);\n    // ... perform search\n    return Results.Ok(new { query, results = Array.Empty<string>() });\n});\n\napp.Run();"
