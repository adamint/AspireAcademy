instructions: |
  Build a multi-endpoint service mesh with named endpoints, custom protocols, and endpoint-driven environment variables.

  1. Add an API project with two named HTTP endpoints: `"public"` (external) and `"internal"` (internal).
  2. Add a gRPC container with a custom endpoint on port 5050 using scheme `"http"` and transport `"http2"`.
  3. Add a Redis container with its endpoint on target port 6379.
  4. Wire the API to reference the gRPC service and Redis.
  5. Add a frontend project and pass `API_URL` as an environment variable using the API's `"public"` endpoint.

starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add API project with "public" (external) and "internal" HTTP endpoints

  // TODO: Add gRPC container with endpoint on port 5050 (http2 transport)

  // TODO: Add Redis container with endpoint on target port 6379

  // TODO: Wire API to reference gRPC and Redis

  // TODO: Add frontend with API_URL from API's "public" endpoint

  builder.Build().Run();

solutionCode: |
  using Aspire.Hosting;
  using System.Net.Sockets;

  var builder = DistributedApplication.CreateBuilder(args);

  var api = builder.AddProject<Projects.ApiService>("api")
      .WithHttpEndpoint(name: "public")
      .WithEndpoint("public", e => e.IsExternal = true)
      .WithHttpEndpoint(name: "internal");

  var grpc = builder.AddContainer("grpc", "grpc-service:latest")
      .WithEndpoint("grpc", endpoint =>
      {
          endpoint.Port = 5050;
          endpoint.UriScheme = "http";
          endpoint.Transport = "http2";
          endpoint.Protocol = ProtocolType.Tcp;
      });

  var redis = builder.AddContainer("cache", "redis:7")
      .WithEndpoint(targetPort: 6379, scheme: "tcp", name: "redis");

  api = api.WithReference(grpc).WithReference(redis);

  var frontend = builder.AddProject<Projects.Frontend>("frontend")
      .WithEnvironment("API_URL", api.GetEndpoint("public"));

  builder.Build().Run();

testCases:
  - id: tc1
    name: "Code compiles"
    type: compiles
    expected: null
    description: "The AppHost code must compile without errors."
  - id: tc2
    name: "API has public endpoint"
    type: contains
    expected: '"public"'
    description: "The API should have a named 'public' endpoint."
  - id: tc3
    name: "gRPC uses http2 transport"
    type: contains
    expected: '"http2"'
    description: "The gRPC endpoint should use http2 transport."
  - id: tc4
    name: "Frontend has API_URL"
    type: contains
    expected: 'WithEnvironment("API_URL"'
    description: "The frontend should receive API_URL as an environment variable."

hints:
  - "Use `WithHttpEndpoint(name: \"public\")` then `WithEndpoint(\"public\", e => e.IsExternal = true)` for the external endpoint."
  - "For gRPC, use `WithEndpoint(\"grpc\", endpoint => { endpoint.Transport = \"http2\"; ... })`."
  - "`api.GetEndpoint(\"public\")` returns an `EndpointReference` for the named endpoint."
  - "Pass the endpoint reference to `WithEnvironment(\"API_URL\", endpointRef)`."

requiredPackages:
  - "Aspire.Hosting"
