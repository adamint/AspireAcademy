instructions: |
  Write a complete hosting integration for Meilisearch, a search engine.

  **Your tasks:**
  1. Define `MeilisearchResource` inheriting `ContainerResource` and implementing `IResourceWithConnectionString`
  2. Implement `ConnectionStringExpression` using `ReferenceExpression.Create` with endpoint properties
  3. Write an `AddMeilisearch()` extension method on `IDistributedApplicationBuilder`
  4. Configure the container image `"getmeili/meilisearch"`, tag `"v1.7"`, and target port 7700
  5. Add an HTTP health check on the primary endpoint
starterCode: '// Write a hosting integration for Meilisearch (search engine)

  // 1. Define MeilisearchResource inheriting ContainerResource + IResourceWithConnectionString

  // 2. Write AddMeilisearch extension method

  // 3. Configure image "getmeili/meilisearch", tag "v1.7", port 7700

  // 4. Add health check


  // Your code here:'
solutionCode: "public class MeilisearchResource(string name) :\n    ContainerResource(name), IResourceWithConnectionString\n{\n    internal const string PrimaryEndpointName = \"http\";\n    private EndpointReference?\
  \ _endpoint;\n    public EndpointReference PrimaryEndpoint =>\n        _endpoint ??= new(this, PrimaryEndpointName);\n\n    public ReferenceExpression ConnectionStringExpression =>\n        ReferenceExpression.Create(\n\
  \            $\"http://{PrimaryEndpoint.Property(EndpointProperty.Host)}:{PrimaryEndpoint.Property(EndpointProperty.Port)}\");\n}\n\npublic static class MeilisearchExtensions\n{\n    public static IResourceBuilder<MeilisearchResource>\
  \ AddMeilisearch(\n        this IDistributedApplicationBuilder builder, string name)\n    {\n        return builder.AddResource(new MeilisearchResource(name))\n            .WithImage(\"getmeili/meilisearch\"\
  )\n            .WithImageTag(\"v1.7\")\n            .WithHttpEndpoint(targetPort: 7700, name: MeilisearchResource.PrimaryEndpointName)\n            .WithHealthCheck(MeilisearchResource.PrimaryEndpointName);\n\
  \    }\n}"
