hints:
- MeilisearchResource should inherit from ContainerResource and implement IResourceWithConnectionString
- IResourceWithConnectionString requires a ConnectionStringExpression property returning ReferenceExpression
- Use builder.AddResource(new MeilisearchResource(name)) then chain .WithImage().WithImageTag().WithHttpEndpoint()
- WithHealthCheck(endpointName) adds an HTTP health check on that endpoint
