instructions: |
  # 🏰 Boss Challenge: Multi-Service Application

  Build a complete AppHost with multiple resources, service references, and proper dependency ordering.

  **Your task:**
  1. Add PostgreSQL named `"postgres"` with a data volume `"pg-data"`
  2. Add a database named `"catalogdb"` on the PostgreSQL server
  3. Add Redis named `"cache"`
  4. Add a project `"catalogapi"` that references `catalogdb` and `cache`, and waits for both
  5. Add a project `"webapp"` that references `catalogapi`, waits for it, and has external HTTP endpoints

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add PostgreSQL with a database
  // TODO: Add Redis
  // TODO: Add catalog API project with references
  // TODO: Add web app project that depends on the API

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var postgres = builder.AddPostgres("postgres")
      .WithDataVolume("pg-data");
  var catalogdb = postgres.AddDatabase("catalogdb");

  var cache = builder.AddRedis("cache");

  var catalogapi = builder.AddProject("catalogapi")
      .WithReference(catalogdb)
      .WithReference(cache)
      .WaitFor(postgres)
      .WaitFor(cache);

  builder.AddProject("webapp")
      .WithReference(catalogapi)
      .WaitFor(catalogapi)
      .WithExternalHttpEndpoints();

  builder.Build().Run();

