instructions: |
  # Configure Docker Compose Publishing

  Set up an AppHost that publishes to Docker Compose with a Redis cache and an API project.

  **What to do:**
  1. Add a Docker Compose environment named `"compose"`
  2. Add a Redis cache named `"cache"`
  3. Add a project named `"api"` that references the cache
  4. Enable the Aspire Dashboard on the compose environment

  **Key concepts:**
  - `AddDockerComposeEnvironment` registers a compute environment for Docker Compose output
  - `WithDashboard()` includes the Aspire Dashboard as a compose service
  - Resource references translate to compose service dependencies and environment variables
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Docker Compose environment named "compose" with dashboard enabled
  // TODO: Add Redis cache named "cache"
  // TODO: Add project "api" that references the cache

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  builder.AddDockerComposeEnvironment("compose")
      .WithDashboard();

  var cache = builder.AddRedis("cache");

  builder.AddProject<Projects.Api>("api")
      .WithReference(cache);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Compiles successfully
    type: compiles
    expected: null
    description: Code must compile without errors
  - id: tc2
    name: Adds Docker Compose environment
    type: code-contains
    expected: AddDockerComposeEnvironment
    description: Must register a Docker Compose publishing environment
  - id: tc3
    name: Enables Dashboard
    type: code-contains
    expected: WithDashboard
    description: Must enable the Aspire Dashboard in compose
  - id: tc4
    name: Adds Redis cache
    type: code-contains
    expected: AddRedis("cache")
    description: Must add a Redis resource named 'cache'
  - id: tc5
    name: References cache from api
    type: code-contains
    expected: WithReference
    description: API project must reference the cache
hints:
  - "Call builder.AddDockerComposeEnvironment(\"compose\") to set up the compute environment"
  - "Chain .WithDashboard() on the compose environment builder"
  - "Use WithReference(cache) on the API project to wire the Redis connection"
requiredPackages:
  - Aspire.Hosting
  - Aspire.Hosting.Redis
  - Aspire.Hosting.Docker
  - Aspire.Hosting.AppHost
sortOrder: 0
