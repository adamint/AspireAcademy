instructions: |
  # Client Integration Basics

  Register a PostgreSQL client integration in a service project using the Aspire Npgsql package.

  **What to do:**
  1. Register an `NpgsqlDataSource` for connection name `"catalogdb"` using `AddNpgsqlDataSource`
  2. Create a GET `/products` endpoint that uses the data source to query the database
  3. Use `NpgsqlDataSource` to create a command, execute a query, and return results

  **Key concepts:**
  - `builder.AddNpgsqlDataSource(connectionName)` registers an `NpgsqlDataSource` in DI
  - The connection name must match what the AppHost provides via `WithReference()`
  - Client integrations auto-configure health checks, retries, and telemetry
starterCode: |
  using Npgsql;

  var builder = WebApplication.CreateBuilder(args);

  // TODO: Register NpgsqlDataSource for "catalogdb"

  var app = builder.Build();

  app.MapGet("/products", async (NpgsqlDataSource dataSource) =>
  {
      // TODO: Create a command, execute a query, return results
      await using var cmd = dataSource.CreateCommand("SELECT name FROM products");
      await using var reader = await cmd.ExecuteReaderAsync();
      var products = new List<string>();
      while (await reader.ReadAsync())
      {
          products.Add(reader.GetString(0));
      }
      return Results.Ok(products);
  });

  app.Run();
solutionCode: |
  using Npgsql;

  var builder = WebApplication.CreateBuilder(args);

  builder.AddNpgsqlDataSource("catalogdb");

  var app = builder.Build();

  app.MapGet("/products", async (NpgsqlDataSource dataSource) =>
  {
      await using var cmd = dataSource.CreateCommand("SELECT name FROM products");
      await using var reader = await cmd.ExecuteReaderAsync();
      var products = new List<string>();
      while (await reader.ReadAsync())
      {
          products.Add(reader.GetString(0));
      }
      return Results.Ok(products);
  });

  app.Run();
testCases:
  - id: tc1
    name: Code compiles
    type: compiles
    expected: null
    description: The service code must compile without errors.
  - id: tc2
    name: Registers NpgsqlDataSource
    type: code-contains
    expected: AddNpgsqlDataSource
    description: Must use AddNpgsqlDataSource to register the PostgreSQL data source.
  - id: tc3
    name: Uses connection name
    type: code-contains
    expected: '"catalogdb"'
    description: Must register with the correct connection name.
  - id: tc4
    name: Injects data source
    type: code-contains
    expected: NpgsqlDataSource dataSource
    description: Must inject NpgsqlDataSource via dependency injection.
hints:
  - 'Use `builder.AddNpgsqlDataSource("catalogdb")` to register the data source.'
  - The connection name "catalogdb" must match what the AppHost provides via WithReference.
  - NpgsqlDataSource is injected via DI into endpoint handlers.
requiredPackages:
  - Aspire.Npgsql
