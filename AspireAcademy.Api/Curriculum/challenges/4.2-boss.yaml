instructions: |
  # Boss Challenge: Multi-Tier Caching Architecture

  Configure an AppHost with a two-tier caching strategy: Redis as the primary cache with full monitoring and persistence, plus Garnet as a high-performance session store.

  **What to do:**
  1. Add Redis named `"primary-cache"` with `WithRedisInsight()`, `WithPersistence()`, and `WithDataVolume()`
  2. Add Garnet named `"session-store"` with `WithDataVolume()`
  3. Add a project `"api"` that references both cache resources

  **Key concepts:**
  - Redis and Garnet are wire-compatible but separate resource types
  - `WithRedisInsight` adds a graphical management UI for Redis
  - `WithPersistence` enables RDB snapshots; pair with `WithDataVolume` for durability
  - A project can reference multiple cache resources via chained `WithReference` calls
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Redis "primary-cache" with RedisInsight, persistence, and data volume
  // TODO: Add Garnet "session-store" with data volume
  // TODO: Add "api" project referencing both caches

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var primaryCache = builder.AddRedis("primary-cache")
      .WithRedisInsight()
      .WithPersistence()
      .WithDataVolume();

  var sessionStore = builder.AddGarnet("session-store")
      .WithDataVolume();

  builder.AddProject<Projects.Api>("api")
      .WithReference(primaryCache)
      .WithReference(sessionStore);

  builder.Build().Run();
testCases:
  - id: tc1
    name: "Adds Redis primary cache"
    type: code-contains
    expected: 'AddRedis("primary-cache")'
    description: "Code must add a Redis resource named 'primary-cache'"
  - id: tc2
    name: "Redis has RedisInsight"
    type: code-contains
    expected: "WithRedisInsight"
    description: "Redis must have RedisInsight enabled for monitoring"
  - id: tc3
    name: "Redis has persistence"
    type: code-contains
    expected: "WithPersistence"
    description: "Redis must have persistence configured"
  - id: tc4
    name: "Adds Garnet session store"
    type: code-contains
    expected: 'AddGarnet("session-store")'
    description: "Code must add a Garnet resource named 'session-store'"
  - id: tc5
    name: "Both have data volumes"
    type: code-contains
    expected: "WithDataVolume"
    description: "Both cache resources must have data volumes for persistence"
  - id: tc6
    name: "Adds api project"
    type: code-contains
    expected: 'AddProject'
    description: "Code must add a project resource for the api"
  - id: tc7
    name: "Wires references to api"
    type: code-contains
    expected: "WithReference"
    description: "Code must use WithReference to wire cache connections to the api project"
hints:
  - "Chain methods: AddRedis(\"primary-cache\").WithRedisInsight().WithPersistence().WithDataVolume()"
  - "Garnet uses AddGarnet, not AddRedis — they are different resource types"
  - "Both produce the same connection string format (host:port), but they are separate resources"
requiredPackages:
  - "Aspire.Hosting"
  - "Aspire.Hosting.Redis"
  - "Aspire.Hosting.Garnet"
sortOrder: 0
