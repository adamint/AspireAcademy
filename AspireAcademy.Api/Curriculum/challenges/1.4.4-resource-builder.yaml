instructions: |
  # The IResourceBuilder<T> Fluent Pattern

  Aspire uses the builder pattern extensively. Each `Add*` method returns an `IResourceBuilder<T>`
  that lets you chain configuration calls.

  **Your task:**
  1. Create an AppHost builder (already provided)
  2. Add a Redis container named `"cache"` using `builder.AddRedis("cache")`
  3. Chain `.WithDataVolume("redis-data")` to persist data
  4. Add a project reference named `"api"` using `builder.AddProject("api")`
  5. Chain `.WithReference(cache)` so the API can access Redis
  6. Chain `.WithHttpEndpoint(port: 5000)` to expose port 5000
  7. Call `builder.Build().Run()`

starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Redis named "cache" with a data volume "redis-data"

  // TODO: Add a project "api" that references cache and has an HTTP endpoint on port 5000

  builder.Build().Run();

solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var cache = builder.AddRedis("cache")
      .WithDataVolume("redis-data");

  builder.AddProject("api")
      .WithReference(cache)
      .WithHttpEndpoint(port: 5000);

  builder.Build().Run();

