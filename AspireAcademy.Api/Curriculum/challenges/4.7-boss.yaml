  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var shopdb = builder.AddPostgres("postgres")
                      .WithDataVolume()
                      .AddDatabase("shopdb");

  var cache = builder.AddRedis("cache")
                     .WithDataVolume()
                     .WithRedisCommander();

  var messaging = builder.AddRabbitMQ("messaging");

  var stripeKey = builder.AddParameter("stripe-key", secret: true);

  var api = builder.AddProject<Projects.ApiService>("api")
                   .WithReference(shopdb)
                   .WithReference(cache)
                   .WithReference(messaging)
                   .WithEnvironment("STRIPE_KEY", stripeKey)
                   .WaitFor(shopdb)
                   .WaitFor(cache)
                   .WaitFor(messaging);

  builder.AddProject<Projects.WorkerService>("worker")
         .WithReference(messaging)
         .WaitFor(messaging);

  builder.AddProject<Projects.Web>("web")
         .WithExternalHttpEndpoints()
         .WithReference(api)
         .WaitFor(api);

  builder.Build().Run();
