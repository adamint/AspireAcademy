instructions: |
  # Boss Challenge: Full Integration AppHost

  Build a complete production-style AppHost that orchestrates multiple databases, caching, messaging, and secrets.

  **What to do:**
  1. Add a PostgreSQL server named `"postgres"` with a data volume and a database named `"shopdb"`
  2. Add a Redis resource named `"cache"` with a data volume and Redis Commander
  3. Add a RabbitMQ resource named `"messaging"`
  4. Add a secret parameter named `"stripe-key"` using `AddParameter` with `secret: true`
  5. Add an API project named `"api"` using `Projects.ApiService` that references the database, cache, messaging, and the stripe key
  6. Add a worker project named `"worker"` using `Projects.WorkerService` that references messaging
  7. Add a web frontend named `"web"` using `Projects.Web` that references the API with external HTTP endpoints

  **Key concepts:**
  - Multiple resource types can coexist in a single AppHost
  - `AddParameter(name, secret: true)` manages sensitive configuration values
  - Different projects reference only the resources they need
  - `WithExternalHttpEndpoints()` exposes a project to external traffic
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add PostgreSQL with a data volume and "shopdb" database

  // TODO: Add Redis with a data volume and Redis Commander

  // TODO: Add RabbitMQ named "messaging"

  // TODO: Add a secret parameter for the Stripe API key

