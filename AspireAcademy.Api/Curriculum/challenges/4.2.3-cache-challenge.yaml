instructions: |
  # Redis Caching AppHost Challenge

  Configure an AppHost with Redis caching, persistence, and a management UI for an API service.

  **What to do:**
  1. Add a Redis resource named `"cache"` with a persistent data volume and Redis Commander
  2. Add a connection string named `"externalapi"` for an external service
  3. Add an API project named `"api"` using `Projects.ApiService` that references both the cache and the external API connection
  4. Use `WaitFor` so the API starts after Redis is healthy

  **Key concepts:**
  - `AddRedis(name)` registers a Redis container resource
  - `WithDataVolume()` persists Redis data across container restarts
  - `WithRedisCommander()` adds the Redis Commander management UI as a sidecar
  - `AddConnectionString(name)` registers an external connection string from configuration
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Redis named "cache" with a data volume and Redis Commander

  // TODO: Add a connection string for an external API

  // TODO: Add an API project that references the cache and external API

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var cache = builder.AddRedis("cache")
                     .WithDataVolume()
                     .WithRedisCommander();

  var externalApi = builder.AddConnectionString("externalapi");

  var api = builder.AddProject<Projects.ApiService>("api")
                   .WithReference(cache)
                   .WithReference(externalApi)
                   .WaitFor(cache);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Compiles successfully
    type: compiles
    expected: null
    description: Code must compile without errors
  - id: tc2
    name: Uses AddRedis
    type: code-contains
    expected: AddRedis
    description: Must add a Redis resource
  - id: tc3
    name: Names the cache resource
    type: code-contains
    expected: '"cache"'
    description: Redis must be named 'cache'
  - id: tc4
    name: Uses WithDataVolume
    type: code-contains
    expected: WithDataVolume
    description: Redis must have a persistent data volume
  - id: tc5
    name: Uses WithRedisCommander
    type: code-contains
    expected: WithRedisCommander
    description: Must add Redis Commander management UI
  - id: tc6
    name: Adds external connection string
    type: code-contains
    expected: AddConnectionString
    description: Must register an external connection string
  - id: tc7
    name: API references cache
    type: code-contains
    expected: WithReference(cache)
    description: API must reference the Redis cache
  - id: tc8
    name: Adds API project
    type: code-pattern
    expected: 'AddProject.*"api"'
    description: Must add a project named 'api'
  - id: tc9
    name: Uses WaitFor
    type: code-contains
    expected: WaitFor(cache)
    description: API must wait for Redis to be healthy before starting
hints:
  - Chain .WithDataVolume() and .WithRedisCommander() directly on the AddRedis call
  - Use builder.AddConnectionString("externalapi") to register the external service connection
  - The API project needs .WithReference() for both the cache and the external API connection
  - Don't forget .WaitFor(cache) on the API project
requiredPackages:
  - Aspire.Hosting
  - Aspire.Hosting.AppHost
  - Aspire.Hosting.Redis
