hints:
- 'Follow the same pattern as MeilisearchResource: inherit ContainerResource, implement IResourceWithConnectionString'
- ConnectionStringExpression uses ReferenceExpression.Create with endpoint properties
- The extension method should call AddResource, WithImage, WithHttpEndpoint, WithHealthCheck
- Subscribe to ResourceReadyEvent with the resource as filter
- Wire it to a project with WithReference and WaitFor
