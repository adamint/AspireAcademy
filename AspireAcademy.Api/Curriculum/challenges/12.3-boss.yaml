starterCode: '// Build a complete hosting integration for a hypothetical "MetricsDB" service:

  // 1. MetricsDbResource inheriting ContainerResource + IResourceWithConnectionString

  // 2. AddMetricsDb extension method (image: metricsdb/server, port: 9090)

  // 3. Health check annotation

  // 4. Subscribe to ResourceReadyEvent to log when MetricsDB is ready

  // 5. Register it in an AppHost with another service referencing it


  // Your code here:'
solutionCode: "public class MetricsDbResource(string name) :\n    ContainerResource(name), IResourceWithConnectionString\n{\n    internal const string EndpointName = \"http\";\n    private EndpointReference?\
  \ _endpoint;\n    public EndpointReference Endpoint => _endpoint ??= new(this, EndpointName);\n\n    public ReferenceExpression ConnectionStringExpression =>\n        ReferenceExpression.Create(\n   \
  \         $\"http://{Endpoint.Property(EndpointProperty.Host)}:{Endpoint.Property(EndpointProperty.Port)}\");\n}\n\npublic static class MetricsDbExtensions\n{\n    public static IResourceBuilder<MetricsDbResource>\
  \ AddMetricsDb(\n        this IDistributedApplicationBuilder builder, string name)\n    {\n        return builder.AddResource(new MetricsDbResource(name))\n            .WithImage(\"metricsdb/server\"\
  )\n            .WithImageTag(\"latest\")\n            .WithHttpEndpoint(targetPort: 9090, name: MetricsDbResource.EndpointName)\n            .WithHealthCheck(MetricsDbResource.EndpointName);\n    }\n\
  }\n\n// Usage:\nvar builder = DistributedApplication.CreateBuilder(args);\n\nvar metrics = builder.AddMetricsDb(\"metrics\");\n\nbuilder.Eventing.Subscribe<ResourceReadyEvent>(\n    metrics.Resource,\n\
  \    async (evt, ct) => Console.WriteLine(\"MetricsDB ready!\"));\n\nbuilder.AddProject<Projects.Api>(\"api\")\n    .WithReference(metrics)\n    .WaitFor(metrics);\n\nbuilder.Build().Run();"
