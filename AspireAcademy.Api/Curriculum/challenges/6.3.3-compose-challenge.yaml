instructions: |
  # Custom Resource Lifecycle Challenge

  Build an AppHost that uses custom container configuration and lifecycle management to set up a monitoring stack alongside your API.

  **What to do:**
  1. Add a container named `"prometheus"` using the `"prom/prometheus"` image
  2. Configure Prometheus with a bind mount: `.WithBindMount("./prometheus.yml", "/etc/prometheus/prometheus.yml")`
  3. Add an HTTP endpoint to Prometheus targeting port 9090 with `WithHttpEndpoint`
  4. Add a container named `"grafana"` using the `"grafana/grafana"` image
  5. Configure Grafana with an HTTP endpoint targeting port 3000
  6. Set the Grafana admin password with `.WithEnvironment("GF_SECURITY_ADMIN_PASSWORD", "admin")`
  7. Add a project named `"api"` using `Projects.ApiService` that references both Prometheus and Grafana

  **Key concepts:**
  - `AddContainer(name, image)` registers a custom container resource
  - `WithBindMount(source, target)` mounts a host path into the container
  - `WithHttpEndpoint(targetPort)` exposes an HTTP endpoint on a specific container port
  - `WithEnvironment(key, value)` sets environment variables on a container
  - `WithReference(resource)` connects services together
starterCode: |
