instructions: |
  Build a secure configuration pipeline with generated passwords, external connection strings, and parameter-driven environment variables.

  1. Add a PostgreSQL container named `"db"`.
  2. Define a secret parameter `"pg-password"` with a generated default (min 16 chars, letters + digits).
  3. Pass the password to PostgreSQL via `WithEnvironment("POSTGRES_PASSWORD", password)`.
  4. Add an external connection string `"legacy-db"`.
  5. Add a non-secret parameter `"feature-flags"`.
  6. Add an API project referencing PostgreSQL and the legacy connection string.
  7. Pass the feature flags to the API via `WithEnvironment("FEATURE_FLAGS", featureFlags)`.

starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Create secret parameter "pg-password" with generated default

  // TODO: Add PostgreSQL container with POSTGRES_PASSWORD from parameter

  // TODO: Add external connection string "legacy-db"

  // TODO: Add non-secret parameter "feature-flags"

  // TODO: Add API project referencing db and legacy-db, with FEATURE_FLAGS env var

  builder.Build().Run();

solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var pgPassword = builder.AddParameter("pg-password", new GenerateParameterDefault
  {
      MinLength = 16,
      Lower = true,
      Upper = true,
      Numeric = true,
      Special = false
  }, secret: true);

  var db = builder.AddContainer("db", "postgres:16")
      .WithEnvironment("POSTGRES_PASSWORD", pgPassword)
      .WithEndpoint(targetPort: 5432, scheme: "tcp", name: "tcp");

  var legacyDb = builder.AddConnectionString("legacy-db");

  var featureFlags = builder.AddParameter("feature-flags");

  builder.AddProject<Projects.ApiService>("api")
      .WithReference(db)
      .WithReference(legacyDb)
      .WithEnvironment("FEATURE_FLAGS", featureFlags);

  builder.Build().Run();

testCases:
  - id: tc1
    name: "Code compiles"
    type: compiles
    expected: null
    description: "The AppHost code must compile without errors."
  - id: tc2
    name: "Password is generated"
    type: contains
    expected: "GenerateParameterDefault"
    description: "The pg-password should use a generated default."
  - id: tc3
    name: "PostgreSQL has password"
    type: contains
    expected: 'WithEnvironment("POSTGRES_PASSWORD"'
    description: "PostgreSQL container should receive the password."
  - id: tc4
    name: "Legacy connection string"
    type: contains
    expected: 'AddConnectionString("legacy-db")'
    description: "Should register an external connection string."
  - id: tc5
    name: "Feature flags passed"
    type: contains
    expected: 'WithEnvironment("FEATURE_FLAGS"'
    description: "The API should receive the feature flags parameter."

hints:
  - "Use `GenerateParameterDefault` with `MinLength = 16` for the password."
  - "`AddConnectionString(\"legacy-db\")` reads from `ConnectionStrings:legacy-db` in configuration."
  - "Use `AddParameter(\"feature-flags\")` without `secret: true` for non-sensitive values."
  - "Wire everything to the API project with `WithReference()` and `WithEnvironment()`."

requiredPackages:
  - "Aspire.Hosting"
