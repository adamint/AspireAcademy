instructions: |
  Scaffold your first Aspire app and add two resources to the AppHost.

  **Your tasks:**
  1. Add a Redis cache resource named `"cache"` using `builder.AddRedis()`
  2. Add an Nginx container resource named `"proxy"` using `builder.AddContainer()` with the `"nginx"` image
  3. Optionally, expose Nginx on port 8080 with `.WithHttpEndpoint(port: 8080, targetPort: 80)`

  When you run this AppHost, both resources will appear in the Aspire Dashboard.
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add a Redis cache resource named "cache"

  // TODO: Add a container resource for Nginx named "proxy" using the "nginx" image

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var cache = builder.AddRedis("cache");

  builder.AddContainer("proxy", "nginx")
      .WithHttpEndpoint(port: 8080, targetPort: 80);

  builder.Build().Run();
testCases:
  - type: code-contains
    id: "t1"
    name: "Must call AddRedis with the name 'cache'"
    description: "Must call AddRedis with the name 'cache'"
    value: "AddRedis(\"cache\")"
  - type: code-contains
    id: "t2"
    name: "Must call AddContainer with the name 'proxy' and image 'nginx'"
    description: "Must call AddContainer with the name 'proxy' and image 'nginx'"
    value: "AddContainer(\"proxy\", \"nginx\")"
  - type: code-contains
    id: "t3"
    name: "Must call Build().Run()"
    description: "Must call Build().Run()"
    value: "Build().Run()"
hints:
  - "Use builder.AddRedis(\"cache\") to add a Redis resource"
  - "Use builder.AddContainer(\"proxy\", \"nginx\") to add an Nginx container"
  - "You can add an HTTP endpoint to Nginx with .WithHttpEndpoint(port: 8080, targetPort: 80)"
requiredPackages:
  - Aspire.Hosting.Redis
