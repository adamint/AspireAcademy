instructions: |
  Build a custom resource with annotations from scratch and wire it into the app model.

  **Your tasks:**
  1. Define a `FeatureFlagResource` class inheriting from `Resource` that implements `IResourceWithConnectionString`
  2. Implement the required `ConnectionStringExpression` property
  3. Register it with `builder.AddResource()` and add an endpoint on port 9090
  4. Create a custom `FeatureFlagCountAnnotation` implementing `IResourceAnnotation`
  5. Attach the annotation with `.WithAnnotation()`
  6. Add a project that references the feature flag service with `.WithReference()`
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Create a custom resource class called FeatureFlagResource
  // that inherits from Resource and implements IResourceWithConnectionString
  //
  // Then register it with the builder using:
  //   var flags = builder.AddResource(new FeatureFlagResource("flags"))
  //       .WithEndpoint("http", e => { e.Port = 9090; e.UriScheme = "http"; });
  //
  // Add a custom annotation called FeatureFlagCountAnnotation with a Count property
  //
  // Finally, add a project that references the feature flag service

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var flags = builder.AddResource(new FeatureFlagResource("flags"))
      .WithEndpoint("http", e => { e.Port = 9090; e.UriScheme = "http"; })
      .WithAnnotation(new FeatureFlagCountAnnotation { Count = 42 });

  builder.AddProject<Projects.Api>("api")
      .WithReference(flags);

  builder.Build().Run();

  class FeatureFlagResource(string name) : Resource(name), IResourceWithConnectionString
  {
      public ReferenceExpression ConnectionStringExpression =>
          ReferenceExpression.Create($"http://flags:9090");
  }

  class FeatureFlagCountAnnotation : IResourceAnnotation
  {
      public int Count { get; set; }
  }
testCases:
  - type: code-pattern
    id: "t1"
    name: "Must define a FeatureFlagResource class"
    description: "Must define a class named FeatureFlagResource"
    value: "class\\s+FeatureFlagResource"
  - type: code-contains
    id: "t2"
    name: "Must implement IResourceWithConnectionString"
    description: "FeatureFlagResource must implement IResourceWithConnectionString"
    value: "IResourceWithConnectionString"
  - type: code-pattern
    id: "t3"
    name: "Must define a custom annotation class"
    description: "Must define an annotation class implementing IResourceAnnotation"
    value: "class\\s+\\w+.*IResourceAnnotation"
  - type: code-contains
    id: "t4"
    name: "Must attach annotation with .WithAnnotation()"
    description: "Must chain .WithAnnotation() to attach the annotation"
    value: ".WithAnnotation("
  - type: code-contains
    id: "t5"
    name: "Must wire project with .WithReference()"
    description: "Must chain .WithReference() to wire the project"
    value: ".WithReference("
  - type: code-contains
    id: "t6"
    name: "Must implement ConnectionStringExpression"
    description: "Must define ConnectionStringExpression property"
    value: "ConnectionStringExpression"
