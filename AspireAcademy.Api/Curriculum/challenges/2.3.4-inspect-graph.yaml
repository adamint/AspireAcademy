instructions: |
  Use Aspire's eventing system to inspect the complete resource graph at startup.

  **Your tasks:**
  1. Subscribe to `BeforeStartEvent` using `builder.Eventing.Subscribe<BeforeStartEvent>()`
  2. In the event handler, iterate over `evt.Model.Resources`
  3. Log each resource's `Name` and `Annotations.Count` to the console

  This lets you see every resource and its annotations before the app starts running.
starterCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var redis = builder.AddRedis("cache");
  var postgres = builder.AddPostgres("pg").AddDatabase("mydb");

  var api = builder.AddProject<Projects.Api>("api")
      .WithReference(postgres)
      .WithReference(redis)
      .WaitFor(postgres);

  // TODO: Use builder.Eventing to subscribe to BeforeStartEvent
  // In the event handler, iterate over the app model's resources
  // and log each resource's name and annotation count

  builder.Build().Run();
solutionCode: |
  var builder = DistributedApplication.CreateBuilder(args);

  var redis = builder.AddRedis("cache");
  var postgres = builder.AddPostgres("pg").AddDatabase("mydb");

  var api = builder.AddProject<Projects.Api>("api")
      .WithReference(postgres)
      .WithReference(redis)
      .WaitFor(postgres);

  builder.Eventing.Subscribe<BeforeStartEvent>((evt, ct) =>
  {
      foreach (var resource in evt.Model.Resources)
      {
          Console.WriteLine($"Resource: {resource.Name}, Annotations: {resource.Annotations.Count}");
      }
      return Task.CompletedTask;
  });

  builder.Build().Run();
testCases:
  - type: code-contains
    id: "t1"
    name: "Must subscribe to BeforeStartEvent"
    description: "Must call Subscribe<BeforeStartEvent> on the eventing system"
    value: "Subscribe<BeforeStartEvent>"
  - type: code-contains
    id: "t2"
    name: "Must access Model.Resources"
    description: "Must access the resource collection via .Model.Resources"
    value: ".Model.Resources"
  - type: code-contains
    id: "t3"
    name: "Must access resource Name property"
    description: "Must access each resource's .Name property"
    value: ".Name"
  - type: code-contains
    id: "t4"
    name: "Must access Annotations property"
    description: "Must access .Annotations on each resource"
    value: ".Annotations"
hints:
  - "Use builder.Eventing.Subscribe<BeforeStartEvent>(...) to hook into app startup"
  - "The event gives you access to evt.Model.Resources"
  - "Each resource has .Name and .Annotations properties"
requiredPackages: []
