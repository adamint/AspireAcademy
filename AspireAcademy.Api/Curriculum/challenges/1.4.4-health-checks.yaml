instructions: |
  # Health Checks: /health and /alive

  ServiceDefaults sets up health check endpoints that the Aspire Dashboard monitors. In this challenge, you'll add a custom health check to the default configuration.

  **What to do:**
  1. In `AddDefaultHealthChecks`, add a custom health check named `"database"` using `AddCheck`
  2. The check should return `HealthCheckResult.Healthy()` (simulating a passing DB check)
  3. In `MapDefaultEndpoints`, map `/health` for all health checks and `/alive` for liveness checks tagged `"live"`

  **Key concepts:**
  - `AddHealthChecks()` registers the health check system
  - `AddCheck(name, check, tags)` registers a named check
  - `MapHealthChecks(path)` exposes an HTTP endpoint
  - The `"live"` tag distinguishes liveness checks from readiness checks
