instructions: |
  # Configuring Health Checks

  Aspire ServiceDefaults registers standard health check endpoints. In this challenge,
  you'll set up a WebApplication with health checks.

  **Your task:**
  1. Create a WebApplication builder (already provided)
  2. Add health checks with `builder.Services.AddHealthChecks()`
  3. Add a custom health check named `"self"` using `.AddCheck("self", () => HealthCheckResult.Healthy())`
  4. Build the app
  5. Map the health check endpoint with `app.MapHealthChecks("/health")`
  6. Map an alive endpoint with `app.MapHealthChecks("/alive")`

starterCode: |
  using Microsoft.AspNetCore.Builder;
  using Microsoft.Extensions.Diagnostics.HealthChecks;

  var builder = WebApplication.CreateBuilder(args);

  // TODO: Add health checks with a custom check named "self"

  var app = builder.Build();

  // TODO: Map health check endpoints at "/health" and "/alive"

  app.Run();

solutionCode: |
  using Microsoft.AspNetCore.Builder;
  using Microsoft.Extensions.Diagnostics.HealthChecks;

  var builder = WebApplication.CreateBuilder(args);

  builder.Services.AddHealthChecks()
      .AddCheck("self", () => HealthCheckResult.Healthy());

  var app = builder.Build();

  app.MapHealthChecks("/health");
  app.MapHealthChecks("/alive");

  app.Run();

