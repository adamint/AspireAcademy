instructions: |
  # 🏰 Boss Challenge: Custom ServiceDefaults

  Combine everything you've learned to configure a complete service with
  OpenTelemetry tracing, health checks, and HTTP resilience.

  **Your task:**
  1. Create a WebApplication builder (provided)
  2. Add OpenTelemetry with `builder.Services.AddOpenTelemetry()` and chain `.WithTracing(t => t.AddAspNetCoreInstrumentation())` and `.WithMetrics(m => m.AddAspNetCoreInstrumentation())`
  3. Add health checks with a check named `"self"`
  4. Add standard resilience: `builder.Services.ConfigureHttpClientDefaults(http => http.AddStandardResilienceHandler())`
  5. Build the app and map `/health` and `/alive` endpoints

starterCode: |
  using Microsoft.AspNetCore.Builder;
  using Microsoft.Extensions.Diagnostics.HealthChecks;

  var builder = WebApplication.CreateBuilder(args);

