instructions: |
  Build an AppHost with a database migration workflow using WaitFor and WaitForCompletion.

  1. Add a PostgreSQL server with database `"appdb"`.
  2. Add a migration project `"migrator"` that references the database and waits for it to be healthy.
  3. Add an API project that references the database, waits for the migrator to complete, and waits for Redis to be healthy.
  4. Add a Redis cache that the API depends on.
  5. Add a web frontend that waits for the API to be healthy.
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add PostgreSQL with database "appdb"

  // TODO: Add Redis cache

  // TODO: Add migrator project - references db, waits for db

  // TODO: Add API project - references db and redis, waits for migrator completion and redis

  // TODO: Add web frontend - references API, waits for API

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var db = builder.AddPostgres("pg").AddDatabase("appdb");
  var redis = builder.AddRedis("cache");

  var migrator = builder.AddProject<Projects.Migrator>("migrator")
      .WithReference(db)
      .WaitFor(db);

  var api = builder.AddProject<Projects.ApiService>("api")
      .WithReference(db)
      .WithReference(redis)
      .WaitForCompletion(migrator)
      .WaitFor(redis);

  var web = builder.AddProject<Projects.WebFrontend>("web")
      .WithReference(api)
      .WaitFor(api);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Code compiles
    type: compiles
    expected: null
    description: The AppHost code must compile without errors.
  - id: tc2
    name: Migrator waits for DB
    type: code-contains
    expected: WaitFor(db)
    description: The migrator should wait for the database to be healthy.
  - id: tc3
    name: API waits for migrator completion
    type: code-contains
    expected: WaitForCompletion(migrator)
    description: The API should wait for migrations to complete.
  - id: tc4
    name: API waits for Redis
    type: code-contains
    expected: WaitFor(redis)
    description: The API should wait for Redis to be healthy.
  - id: tc5
    name: Web waits for API
    type: code-contains
    expected: WaitFor(api)
    description: The web frontend should wait for the API to be healthy.
hints:
  - The migrator needs `.WaitFor(db)` to ensure the database is healthy before running migrations.
  - Use `.WaitForCompletion(migrator)` on the API to wait for migrations to finish.
  - The web frontend should `.WaitFor(api)` since it needs the API to serve requests.
  - 'Remember: `WithReference()` injects config, `WaitFor()` controls startup order — use both.'
requiredPackages:
  - Aspire.Hosting
  - Aspire.Hosting.PostgreSQL
  - Aspire.Hosting.Redis
  - Aspire.Hosting.AppHost
sortOrder: 0
