instructions: |
  Use Aspire's eventing system to hook into resource lifecycle events.

  **Your tasks:**
  1. Subscribe to `ResourceReadyEvent` scoped to the database resource — log `"Database is ready!"` when the database becomes healthy
  2. Subscribe to `BeforeStartEvent` — log the total number of resources in the app model

  Use `builder.Eventing.Subscribe<T>()` for both. For resource-scoped events, pass `db.Resource` as the filter.
starterCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar db = builder.AddPostgres(\"pg\").AddDatabase(\"bazaar-db\");\nvar api = builder.AddProject<Projects.Api>(\"api\")\n    .WithReference(db).WaitFor(db);\n\
  \n// TODO: Subscribe to ResourceReadyEvent for the database\n// and log \"Database is ready!\" to the console\n\n// TODO: Subscribe to BeforeStartEvent\n// and log the total number of resources in the\
  \ app model\n\nbuilder.Build().Run();"
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar db = builder.AddPostgres(\"pg\").AddDatabase(\"bazaar-db\");\nvar api = builder.AddProject<Projects.Api>(\"api\")\n    .WithReference(db).WaitFor(db);\n\
  \nbuilder.Eventing.Subscribe<ResourceReadyEvent>(\n    db.Resource,\n    async (evt, ct) =>\n    {\n        Console.WriteLine($\"Database is ready: {evt.Resource.Name}\");\n    });\n\nbuilder.Eventing.Subscribe<BeforeStartEvent>(async\
  \ (evt, ct) =>\n{\n    Console.WriteLine($\"Total resources: {evt.Model.Resources.Count}\");\n});\n\nbuilder.Build().Run();"
testCases:
- type: code-contains
  id: "t1"
  name: "Must subscribe to ResourceReadyEvent"
  description: "Must call Subscribe<ResourceReadyEvent> for lifecycle events"
  value: "Subscribe<ResourceReadyEvent>"
- type: code-contains
  id: "t2"
  name: "Must subscribe to BeforeStartEvent"
  description: "Must call Subscribe<BeforeStartEvent> on the eventing system"
  value: "Subscribe<BeforeStartEvent>"
- type: code-contains
  id: "t3"
  name: "Must filter ResourceReadyEvent by db.Resource"
  description: "Must pass db.Resource as filter for resource-scoped subscription"
  value: "db.Resource"
- type: code-contains
  id: "t4"
  name: "Must access .Model.Resources collection"
  description: "Must access the resource collection via .Model.Resources"
  value: ".Model.Resources"
hints:
- Use builder.Eventing.Subscribe<ResourceReadyEvent>(resource, handler) for resource-scoped events
- Pass db.Resource as the second parameter to filter to just the database
- BeforeStartEvent gives you evt.Model.Resources for the full resource collection
- Both handlers are async — return Task.CompletedTask if not async
requiredPackages: []
