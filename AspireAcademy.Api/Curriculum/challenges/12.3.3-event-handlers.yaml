starterCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar db = builder.AddPostgres(\"pg\").AddDatabase(\"atlas-db\");\nvar api = builder.AddProject<Projects.Api>(\"api\")\n    .WithReference(db).WaitFor(db);\n\
  \n// TODO: Subscribe to ResourceReadyEvent for the database\n// and log \"Database is ready!\" to the console\n\n// TODO: Subscribe to BeforeStartEvent\n// and log the total number of resources in the\
  \ app model\n\nbuilder.Build().Run();"
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar db = builder.AddPostgres(\"pg\").AddDatabase(\"atlas-db\");\nvar api = builder.AddProject<Projects.Api>(\"api\")\n    .WithReference(db).WaitFor(db);\n\
  \nbuilder.Eventing.Subscribe<ResourceReadyEvent>(\n    db.Resource,\n    async (evt, ct) =>\n    {\n        Console.WriteLine($\"Database is ready: {evt.Resource.Name}\");\n    });\n\nbuilder.Eventing.Subscribe<BeforeStartEvent>(async\
  \ (evt, ct) =>\n{\n    Console.WriteLine($\"Total resources: {evt.Model.Resources.Count}\");\n});\n\nbuilder.Build().Run();"
testCases:
- type: code-contains
  description: Must subscribe to ResourceReadyEvent
  value: ResourceReadyEvent
- type: code-contains
  description: Must subscribe to BeforeStartEvent
  value: BeforeStartEvent
- type: code-contains
  description: Must filter by resource for ResourceReadyEvent
  value: db.Resource
- type: code-contains
  description: Must access Model.Resources
  value: Resources
hints:
- Use builder.Eventing.Subscribe<ResourceReadyEvent>(resource, handler) for resource-scoped events
- Pass db.Resource as the second parameter to filter to just the database
- BeforeStartEvent gives you evt.Model.Resources for the full resource collection
- Both handlers are async — return Task.CompletedTask if not async
requiredPackages: []
