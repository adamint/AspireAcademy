instructions: |
  Add a Node.js frontend and Python API as executable resources and wire them together.

  1. Add a Python API executable at `"./python-api"` running `"python"` with argument `"app.py"`.
  2. Add an HTTP endpoint on port 5001 to the Python API.
  3. Add a Node.js frontend executable at `"./node-app"` running `"node"` with argument `"server.js"`.
  4. Wire the Node.js frontend to reference the Python API using `WithReference()`.
starterCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  // TODO: Add Python API executable at "./python-api" running "python app.py"
  // TODO: Add an HTTP endpoint on port 5001 to the Python API
  // TODO: Add Node.js frontend at "./node-app" running "node server.js"
  // TODO: Wire the frontend to reference the Python API

  builder.Build().Run();
solutionCode: |
  using Aspire.Hosting;

  var builder = DistributedApplication.CreateBuilder(args);

  var pyapi = builder.AddExecutable("pyapi", "python", "./python-api", "app.py")
      .WithHttpEndpoint(port: 5001, name: "http");

  var frontend = builder.AddExecutable("frontend", "node", "./node-app", "server.js")
      .WithReference(pyapi);

  builder.Build().Run();
testCases:
  - id: tc1
    name: Code compiles
    type: compiles
    expected: null
    description: The AppHost code must compile without errors.
  - id: tc2
    name: Python API uses AddExecutable
    type: code-contains
    expected: AddExecutable
    description: Both resources should be added with AddExecutable.
  - id: tc3
    name: Python API has HTTP endpoint
    type: code-contains
    expected: WithHttpEndpoint
    description: The Python API should have an HTTP endpoint.
  - id: tc4
    name: Frontend references Python API
    type: code-contains
    expected: WithReference(pyapi)
    description: The frontend should reference the Python API.
hints:
  - '`AddExecutable("pyapi", "python", "./python-api", "app.py")` adds the Python API.'
  - 'Use `.WithHttpEndpoint(port: 5001, name: "http")` to add an endpoint to the Python API.'
  - '`AddExecutable("frontend", "node", "./node-app", "server.js")` adds the Node.js frontend.'
  - Chain `.WithReference(pyapi)` on the frontend to wire it to the Python API.
requiredPackages:
  - Aspire.Hosting
sortOrder: 0
