  \ 4. Calls GET /health and asserts 200 OK\n// 5. Calls GET /api/search?q=test and asserts a valid response\n\npublic class AtlasApiTests : IAsyncLifetime\n{\n    private DistributedApplication _app =\
  \ null!;\n\n    public async Task InitializeAsync()\n    {\n        // TODO: Create and start the app\n    }\n\n    public async Task DisposeAsync()\n    {\n        // TODO: Clean up\n    }\n\n    [Fact]\n\
  \    public async Task HealthEndpointReturns200()\n    {\n        // TODO: Test health endpoint\n    }\n}"
solutionCode: "public class AtlasApiTests : IAsyncLifetime\n{\n    private DistributedApplication _app = null!;\n\n    public async Task InitializeAsync()\n    {\n        var builder = await DistributedApplicationTestingBuilder\n\
  \            .CreateAsync<Projects.AtlasAppHost>();\n        _app = await builder.BuildAsync();\n        await _app.StartAsync();\n\n        var rns = _app.Services.GetRequiredService<ResourceNotificationService>();\n\
  \        await rns.WaitForResourceAsync(\"api\", KnownResourceStates.Running);\n    }\n\n    public async Task DisposeAsync()\n    {\n        await _app.DisposeAsync();\n    }\n\n    [Fact]\n    public\
  \ async Task HealthEndpointReturns200()\n    {\n        var client = _app.CreateHttpClient(\"api\");\n        var response = await client.GetAsync(\"/health\");\n        response.StatusCode.Should().Be(HttpStatusCode.OK);\n\
  \    }\n}"
