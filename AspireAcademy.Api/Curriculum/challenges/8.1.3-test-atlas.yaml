hints:
- Use DistributedApplicationTestingBuilder.CreateAsync<Projects.AtlasAppHost>()
- Call BuildAsync() then StartAsync() to start the AppHost
- Wait for the API to be ready with WaitForResourceAsync
- Use _app.CreateHttpClient("api") to get an HTTP client
- Assert response.StatusCode is HttpStatusCode.OK
