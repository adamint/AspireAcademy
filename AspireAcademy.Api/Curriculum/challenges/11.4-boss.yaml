instructions: |
  Demonstrate CLI mastery by writing the complete sequence of Aspire CLI commands to go from zero to deployed.

  **Your tasks:** Write each command and explain what it does:
  1. Create a new Aspire project from a starter template
  2. Add a Redis hosting integration to the AppHost
  3. Run the app (starts DCP + Dashboard)
  4. Check the status of all running resources
  5. Stream logs from the API service
  6. Publish the app to Docker Compose
starterCode: '// Describe the sequence of CLI commands to:

  // 1. Create a new Aspire project

  // 2. Add a Redis integration

  // 3. Run the app

  // 4. Check resource status

  // 5. View API logs

  // 6. Publish to Docker Compose

  // Write each command and explain what it does.


  // Command 1: TODO

  // Command 2: TODO

  // Command 3: TODO

  // Command 4: TODO

  // Command 5: TODO

  // Command 6: TODO'
solutionCode: '// Command 1: aspire new aspire-starter --name Bazaar

  // Creates a new Aspire project from the starter template with AppHost + ServiceDefaults + API


  // Command 2: aspire add Bazaar.AppHost --package Aspire.Hosting.Redis

  // Adds the Redis hosting integration NuGet package to the AppHost project


  // Command 3: aspire run

  // Builds the AppHost, starts DCP, launches all resources, opens the Dashboard


  // Command 4: aspire ps

  // Lists all running resources with status (Running/Starting/Exited), type, and endpoints


  // Command 5: aspire logs api

  // Streams console logs from the "api" resource in real time


  // Command 6: aspire publish --target docker-compose --output-path ./deploy

  // Generates docker-compose.yml + .env files in ./deploy/ without starting anything'
testCases:
- type: code-contains
  id: "t1"
  name: "Must use aspire new"
  description: Must use aspire new
  value: aspire new
- type: code-contains
  id: "t2"
  name: "Must use aspire run"
  description: Must use aspire run
  value: aspire run
- type: code-contains
  id: "t3"
  name: "Must use aspire ps"
  description: Must use aspire ps
  value: aspire ps
- type: code-contains
  id: "t4"
  name: "Must use aspire logs"
  description: Must use aspire logs
  value: aspire logs
- type: code-contains
  id: "t5"
  name: "Must use aspire publish"
  description: Must use aspire publish
  value: aspire publish
hints:
- aspire new creates projects, aspire add adds integrations
- aspire run starts the AppHost with DCP and Dashboard
- aspire ps shows running resource status like docker ps
- aspire logs <resource> streams console output
- aspire publish --target docker-compose generates Compose files
requiredPackages: []
