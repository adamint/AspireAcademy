instructions: |
  Build Bazaar with a full integration ecosystem including persistent storage, management plugins, and a custom container.

  **Your tasks:**
  1. PostgreSQL `"pg"` with persistent lifetime, data volume `"pg-data"`, and database `"bazaar-db"`
  2. Redis `"cache"` with persistent lifetime and data volume `"redis-data"`
  3. RabbitMQ `"messaging"` with the management plugin enabled
  4. Meilisearch `"search"` as a container (`"getmeili/meilisearch"`, tag `"v1.7"`, port 7700)
  5. C# API `"api"` referencing all four infrastructure resources with `WaitFor`
  6. Vite frontend `"frontend"` referencing and waiting for the API
starterCode: 'var builder = DistributedApplication.CreateBuilder(args);


  // Build Bazaar with:

  // 1. PostgreSQL "pg" with persistent lifetime and data volume "pg-data" + database "bazaar-db"

  // 2. Redis "cache" with persistent lifetime and data volume "redis-data"

  // 3. RabbitMQ "messaging" with management plugin

  // 4. Meilisearch "search" (custom integration - use AddContainer as fallback)

  // 5. API referencing all four + WaitFor

  // 6. Frontend referencing API + WaitFor


  builder.Build().Run();'
solutionCode: "var builder = DistributedApplication.CreateBuilder(args);\n\nvar postgres = builder.AddPostgres(\"pg\")\n    .WithLifetime(ContainerLifetime.Persistent)\n    .WithDataVolume(\"pg-data\")\n\
  \    .AddDatabase(\"bazaar-db\");\n\nvar redis = builder.AddRedis(\"cache\")\n    .WithLifetime(ContainerLifetime.Persistent)\n    .WithDataVolume(\"redis-data\");\n\nvar rabbitmq = builder.AddRabbitMQ(\"\
  messaging\")\n    .WithManagementPlugin();\n\nvar search = builder.AddContainer(\"search\", \"getmeili/meilisearch\", \"v1.7\")\n    .WithHttpEndpoint(port: 7700, targetPort: 7700);\n\nvar api = builder.AddProject<Projects.BazaarApi>(\"\
  api\")\n    .WithReference(postgres)\n    .WithReference(redis)\n    .WithReference(rabbitmq)\n    .WithReference(search)\n    .WaitFor(postgres)\n    .WaitFor(redis)\n    .WaitFor(rabbitmq);\n\nbuilder.AddViteApp(\"\
  frontend\", \"../bazaar-web\")\n    .WithReference(api)\n    .WaitFor(api);\n\nbuilder.Build().Run();"
testCases:
- type: code-contains
  id: "t1"
  name: "Must use .WithDataVolume() for persistent storage"
  description: "Must chain .WithDataVolume() for persistent data storage"
  value: ".WithDataVolume("
- type: code-contains
  id: "t2"
  name: "Must use ContainerLifetime.Persistent"
  description: "Must use WithLifetime with ContainerLifetime.Persistent"
  value: "ContainerLifetime.Persistent"
- type: code-contains
  id: "t3"
  name: "Must enable RabbitMQ management plugin"
  description: "Must call .WithManagementPlugin() on RabbitMQ"
  value: ".WithManagementPlugin()"
- type: code-contains
  id: "t4"
  name: "Must add Meilisearch container image"
  description: "Must use the getmeili/meilisearch container image"
  value: "getmeili/meilisearch"
- type: code-contains
  id: "t5"
  name: "Must use .WithReference() to wire services"
  description: "Must chain .WithReference() to wire dependencies"
  value: ".WithReference("
- type: code-contains
  id: "t6"
  name: "Must use .WaitFor() for dependencies"
  description: "Must chain .WaitFor() for startup ordering"
  value: ".WaitFor("
hints:
- Use .WithDataVolume("pg-data") on PostgreSQL for persistent data
- Use .WithManagementPlugin() on RabbitMQ for the management UI
- Meilisearch can be added with AddContainer since there is no official hosting integration
- The API should WithReference and WaitFor all infrastructure resources
requiredPackages:
- Aspire.Hosting.PostgreSQL
- Aspire.Hosting.Redis
- Aspire.Hosting.RabbitMQ
- Aspire.Hosting.NodeJs
