# Aspire Academy — Persona Definitions & Curriculum Relevance
# 
# Each persona has a description, icon, and default relevance mappings.
# Relevance levels: high (essential), medium (useful context), low (optional), skip (hide)
#
# moduleDefaults sets the default relevance for all lessons in a module.
# lessonOverrides overrides specific lessons within any module.

