questions:
  - text: "What are the six HelpGroup categories in the Aspire CLI?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "Create, Build, Test, Deploy, Monitor, Configure"
        isCorrect: false
      - id: b
        text: "AppCommands, ResourceManagement, Monitoring, Deployment, ToolsAndConfiguration, None"
        isCorrect: true
      - id: c
        text: "Init, Run, Stop, Publish, Logs, Config"
        isCorrect: false
      - id: d
        text: "Project, Resource, Service, Container, Network, Volume"
        isCorrect: false
    explanation: "The HelpGroup enum defines: None, AppCommands, ResourceManagement, Monitoring, Deployment, and ToolsAndConfiguration. These organize the aspire --help output into logical sections."

  - text: "What is the difference between `aspire run` and `aspire start`?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "run builds first while start skips the build"
        isCorrect: false
      - id: b
        text: "run streams logs in the foreground by default; start always runs in the background"
        isCorrect: true
      - id: c
        text: "run starts services; start starts the AppHost"
        isCorrect: false
      - id: d
        text: "They are identical commands"
        isCorrect: false
    explanation: "aspire run connects to the backchannel and streams resource state/logs in the terminal (foreground by default, background with --detach). aspire start always calls AppHostLauncher.LaunchDetachedAsync() to run in the background immediately."

  - text: "What does `aspire wait api --status healthy --timeout 60` do?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Starts the api resource and waits 60 seconds"
        isCorrect: false
      - id: b
        text: "Blocks until the 'api' resource reports healthy status, timing out after 60 seconds"
        isCorrect: true
      - id: c
        text: "Sends health check requests to the api every 60 seconds"
        isCorrect: false
      - id: d
        text: "Sets a 60-second health check timeout for the api resource"
        isCorrect: false
    explanation: "WaitCommand blocks until the specified resource reaches the target state (healthy by default). If the timeout is exceeded before the resource reaches that state, the command exits with an error."

  - text: "How does `aspire add` resolve integration names?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Exact match only against NuGet package IDs"
        isCorrect: false
      - id: b
        text: "Fuzzy matching against both friendly names and package IDs"
        isCorrect: true
      - id: c
        text: "Keyword search across package descriptions"
        isCorrect: false
      - id: d
        text: "Hardcoded list of known integrations"
        isCorrect: false
    explanation: "AddCommand fuzzy-matches the input against all available integration packages by both friendly name (e.g., 'redis') and full package ID (e.g., 'Aspire.Hosting.Redis'). It prompts for selection if multiple matches are found."

  - text: |
      What three-tier shutdown strategy does `aspire stop` use?
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "SIGTERM → SIGKILL → force restart"
        isCorrect: false
      - id: b
        text: "CLI PID kill → RPC shutdown → AppHost PID fallback"
        isCorrect: true
      - id: c
        text: "graceful stop → hard stop → process cleanup"
        isCorrect: false
      - id: d
        text: "docker stop → docker rm → docker prune"
        isCorrect: false
    explanation: "StopCommand first tries to kill the CLI PID (most graceful), then falls back to RPC shutdown through the backchannel, and finally falls back to killing the AppHost PID directly if other methods fail."
