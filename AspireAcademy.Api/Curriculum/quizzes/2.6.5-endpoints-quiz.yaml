questions:
  - text: "What is the difference between `port` and `targetPort` in `WithHttpEndpoint`?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "`port` is the host-side port; `targetPort` is the port the process listens on inside the container"
        isCorrect: true
      - id: b
        text: "They are the same thing — aliases for compatibility"
        isCorrect: false
      - id: c
        text: "`port` is for HTTP; `targetPort` is for HTTPS"
        isCorrect: false
      - id: d
        text: "`targetPort` is the external port; `port` is internal"
        isCorrect: false
    explanation: "port is the externally visible port on the host (what clients connect to). targetPort is the port inside the container or process (what the application listens on). When isProxied is true (default), Aspire routes traffic from port to targetPort."

  - text: "What does the `env` parameter do in `WithHttpEndpoint(targetPort: 3000, env: \"PORT\")`?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "Sets the PORT environment variable to the allocated port so the app knows which port to listen on"
        isCorrect: true
      - id: b
        text: "Reads the port number from the PORT environment variable"
        isCorrect: false
      - id: c
        text: "Exports the port to other resources"
        isCorrect: false
      - id: d
        text: "Names the endpoint 'PORT'"
        isCorrect: false
    explanation: "The env parameter tells Aspire to inject the allocated target port as an environment variable with the given name. This is essential for polyglot apps (Node.js, Python) that read their listening port from an environment variable."

  - text: "How do you get a reference to a specific endpoint for injection into another resource?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "`api.GetEndpoint(\"https\")` returns an `EndpointReference`"
        isCorrect: true
      - id: b
        text: "`api.Endpoints[\"https\"]` returns a URL string"
        isCorrect: false
      - id: c
        text: "`builder.GetEndpoint(api, \"https\")` returns an endpoint"
        isCorrect: false
      - id: d
        text: "Endpoints can only be injected via WithReference"
        isCorrect: false
    explanation: "Call GetEndpoint(name) on the resource builder to get an EndpointReference. You can then pass it to WithEnvironment to inject the URL, or use .Property(EndpointProperty.Host) to extract individual parts."

  - text: "What happens when you omit the `port` parameter in WithHttpEndpoint?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "The endpoint is disabled"
        isCorrect: false
      - id: b
        text: "It defaults to port 80"
        isCorrect: false
      - id: c
        text: "Aspire automatically allocates an available port"
        isCorrect: true
      - id: d
        text: "It uses the same port as targetPort"
        isCorrect: false
    explanation: "When you omit port, Aspire picks an available port automatically. This prevents port conflicts when running multiple services. The allocated port appears in the Dashboard endpoint URLs."
