questions:
  - text: "What is the top-level structure of an Aspire manifest JSON file?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: 'A "services" array listing all service configurations'
        isCorrect: false
      - id: b
        text: 'A "resources" object where each key is a resource name'
        isCorrect: true
      - id: c
        text: 'A flat list of key-value connection strings'
        isCorrect: false
      - id: d
        text: 'A "deployments" array with environment-specific configs'
        isCorrect: false
    explanation: 'The manifest has a top-level "resources" object. Each key is the resource name (e.g., "cache", "api"), and each value is an object with "type", "connectionString", "bindings", "env", and other properties.'

  - text: "What does the manifest expression `{cache.bindings.tcp.url}` resolve to?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "The container image name for the cache resource"
        isCorrect: false
      - id: b
        text: "The full URL of the cache resource's tcp binding (e.g., tcp://hostname:6379)"
        isCorrect: true
      - id: c
        text: "The Kubernetes service name for the cache"
        isCorrect: false
      - id: d
        text: "The Docker Compose service port mapping"
        isCorrect: false
    explanation: "Manifest expressions use dot-notation paths. {cache.bindings.tcp.url} resolves to the full URL of the cache resource's tcp binding at deploy time, including scheme, host, and port."

  - text: "Which manifest resource type is used for connection-string-only resources?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "connection.v0"
        isCorrect: false
      - id: b
        text: "value.v0"
        isCorrect: true
      - id: c
        text: "string.v0"
        isCorrect: false
      - id: d
        text: "parameter.v0"
        isCorrect: false
    explanation: "value.v0 is used for resources that only provide a connection string (like database references). parameter.v0 is for input parameters, container.v0 for containers, and project.v0 for .NET projects."

  - text: "How are file paths stored in the Aspire manifest?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "As absolute paths on the build machine"
        isCorrect: false
      - id: b
        text: "As relative paths normalized against the manifest directory"
        isCorrect: true
      - id: c
        text: "As container-internal paths"
        isCorrect: false
      - id: d
        text: "As NuGet package references"
        isCorrect: false
    explanation: "ManifestPublishingContext.GetManifestRelativePath() normalizes all file paths relative to the manifest directory. This makes the manifest portable — paths like ../src/Api/Api.csproj work on any machine."

  - text: |
      What does this manifest block represent?
      ```json
      {
        "type": "annotated.string",
        "value": "{api-key.value}",
        "filter": "base64"
      }
      ```
    type: code-prediction
    sortOrder: 5
    points: 15
    options:
      - id: a
        text: "A parameter whose value is Base64-encoded before use"
        isCorrect: true
      - id: b
        text: "A container environment variable set to a Base64 string"
        isCorrect: false
      - id: c
        text: "A secret stored in Base64 format in the manifest"
        isCorrect: false
      - id: d
        text: "A health check filter for API key validation"
        isCorrect: false
    explanation: "annotated.string resources are synthetic resources created for formatted parameters. The filter field tells the deployment tool to transform the parameter value (here, Base64-encode it) before injecting it."
