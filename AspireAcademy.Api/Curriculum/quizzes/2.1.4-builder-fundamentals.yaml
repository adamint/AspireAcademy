questions:
  - text: "What does DistributedApplication.CreateBuilder(args) do?"
    type: multiple-choice
    options:
      - id: a
        text: "Creates a Docker Compose file and starts containers"
        isCorrect: false
      - id: b
        text: "Creates a host with DI, configuration, and Aspire services, then returns a builder for adding resources"
        isCorrect: true
      - id: c
        text: "Starts the DCP process and opens the Dashboard"
        isCorrect: false
      - id: d
        text: "Connects to a Kubernetes cluster and deploys resources"
        isCorrect: false
    explanation: "CreateBuilder sets up the .NET host infrastructure (dependency injection, configuration, logging) and registers Aspire-specific services. It returns a builder you use to add resources. DCP starts later when you call Build().Run()."

  - text: "In which mode does ExecutionContext.IsPublishMode return true?"
    type: multiple-choice
    options:
      - id: a
        text: "When running aspire run"
        isCorrect: false
      - id: b
        text: "When running aspire publish or aspire deploy"
        isCorrect: true
      - id: c
        text: "When running dotnet test"
        isCorrect: false
      - id: d
        text: "Always — it is true by default"
        isCorrect: false
    explanation: "IsPublishMode is true when the AppHost is invoked by aspire publish or aspire deploy. This mode generates deployment artifacts (Compose, K8s, Bicep) without starting local services."

  - text: "A TypeScript AppHost imports its builder from './.modules/aspire.js'. Where does this file come from?"
    type: multiple-choice
    options:
      - id: a
        text: "It is manually written by the developer"
        isCorrect: false
      - id: b
        text: "It is generated by the Aspire CLI from the Application Type System"
        isCorrect: true
      - id: c
        text: "It is downloaded from npm"
        isCorrect: false
      - id: d
        text: "It is a symlink to the .NET SDK"
        isCorrect: false
    explanation: "The .modules/aspire.js file is auto-generated by the Aspire CLI. It contains type-safe TypeScript bindings generated from the Application Type System (ATS), which scans .NET hosting assemblies for [AspireExport] attributes."

  - text: "Which of the following is NOT a valid AppHost language?"
    type: multiple-choice
    options:
      - id: a
        text: "Python"
        isCorrect: true
      - id: b
        text: "C# (single-file)"
        isCorrect: false
      - id: c
        text: "TypeScript"
        isCorrect: false
      - id: d
        text: "C# (.csproj)"
        isCorrect: false
    explanation: "Aspire supports AppHosts in C# (both single-file and .csproj) and TypeScript only. Python, Go, Java, and Rust services can be orchestrated by Aspire, but the AppHost itself must be written in C# or TypeScript."
