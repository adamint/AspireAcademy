title: "Aspire CLI Mastery"
description: "Test your knowledge of the Aspire CLI tools and MCP integration."
questions:
  - question: "Which command scaffolds a new Aspire solution from a template?"
    options:
      - "aspire init"
      - "aspire new"
      - "aspire create"
      - "dotnet new aspire"
    correctAnswer: 1
    explanation: "The `aspire new` command scaffolds complete Aspire solutions from built-in templates like aspire-starter and aspire-empty."

  - question: "What does `aspire add` do when you select an integration?"
    options:
      - "Downloads the source code for the integration"
      - "Creates a new service project for the integration"
      - "Adds the hosting NuGet package and inserts boilerplate code into Program.cs"
      - "Generates configuration files for the integration"
    correctAnswer: 2
    explanation: "The `aspire add` command installs the corresponding Aspire.Hosting.* NuGet package and inserts the Add*() call into your AppHost's Program.cs."

  - question: "What protocol does the Aspire MCP server use to expose application state to AI agents?"
    options:
      - "gRPC Remote Procedure Call"
      - "OpenTelemetry Protocol (OTLP)"
      - "Model Context Protocol (MCP)"
      - "Language Server Protocol (LSP)"
    correctAnswer: 2
    explanation: "Aspire implements a Model Context Protocol (MCP) server — an open standard that defines how AI agents interact with external tools and data sources."

  - question: "Which command builds the AppHost, starts all resources, and launches the dashboard?"
    options:
      - "aspire start"
      - "aspire launch"
      - "aspire run"
      - "aspire dashboard"
    correctAnswer: 2
    explanation: "The `aspire run` command builds your AppHost, starts all registered resources, and opens the Aspire dashboard in your browser."

  - question: "How does `aspire secret` relate to .NET's Secret Manager?"
    options:
      - "It replaces Secret Manager with a custom implementation"
      - "It wraps Secret Manager with Aspire-aware functionality"
      - "It has no relation to Secret Manager"
      - "It only works with Azure Key Vault"
    correctAnswer: 1
    explanation: "The `aspire secret` command wraps .NET's Secret Manager, storing sensitive values in the user's local secret store with Aspire-aware convenience."

  - question: |
      What does `aspire add` insert into your AppHost's Program.cs when you select PostgreSQL?
      ```csharp
      // Before: empty AppHost
      var builder = DistributedApplication.CreateBuilder(args);
      builder.Build().Run();
      ```
    options:
      - "Adds a full PostgreSQL client library with connection pooling"
      - "Inserts `builder.AddPostgres(\"postgres\")` and adds the Aspire.Hosting.PostgreSQL NuGet package"
      - "Creates a docker-compose.yml with a Postgres service"
      - "Generates a migration project for the database"
    correctAnswer: 1
    explanation: "The `aspire add` command adds the hosting NuGet package (Aspire.Hosting.PostgreSQL) to the AppHost project and inserts the corresponding `builder.AddPostgres()` call into Program.cs."
