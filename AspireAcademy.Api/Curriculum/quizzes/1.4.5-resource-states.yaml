questions:
  - text: "Which state indicates a resource failed during startup?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "Exited"
        isCorrect: false
      - id: b
        text: "RuntimeUnhealthy"
        isCorrect: false
      - id: c
        text: "FailedToStart"
        isCorrect: true
      - id: d
        text: "Stopping"
        isCorrect: false
    explanation: "FailedToStart indicates the resource could not start at all. Exited means the process ran and then stopped. RuntimeUnhealthy means it's running but health checks are failing."

  - text: "What is the difference between resource State and Health?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "They are the same thing"
        isCorrect: false
      - id: b
        text: "State tracks if the process is running; Health tracks if it's functioning correctly"
        isCorrect: true
      - id: c
        text: "Health is for containers only; State is for projects"
        isCorrect: false
      - id: d
        text: "State is checked once; Health is checked continuously"
        isCorrect: false
    explanation: "State (Running, Exited, etc.) tracks the process lifecycle. Health (Healthy, Degraded, Unhealthy) tracks functional correctness. A resource can be Running but Unhealthy — e.g., a database container that started but isn't accepting connections yet."

  - text: "Which three states are terminal (resource won't transition further)?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Running, Stopping, Exited"
        isCorrect: false
      - id: b
        text: "Finished, FailedToStart, Exited"
        isCorrect: true
      - id: c
        text: "Starting, Running, Finished"
        isCorrect: false
      - id: d
        text: "NotStarted, Waiting, FailedToStart"
        isCorrect: false
    explanation: "KnownResourceStates defines TerminalStates as [Finished, FailedToStart, Exited]. Finished means exit code 0, Exited means any exit code, FailedToStart means it never started."

  - text: "What state does a resource with unsatisfied WaitFor dependencies enter?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "NotStarted"
        isCorrect: false
      - id: b
        text: "Starting"
        isCorrect: false
      - id: c
        text: "Waiting"
        isCorrect: true
      - id: d
        text: "Building"
        isCorrect: false
    explanation: "When a resource has WaitFor dependencies that aren't healthy yet, it enters the Waiting state. It transitions to Starting once all dependencies are ready."
