questions:
  - text: "Which method adds a web-based graphical management UI for Redis?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "WithRedisCommander"
        isCorrect: false
      - id: b
        text: "WithRedisInsight"
        isCorrect: true
      - id: c
        text: "WithPhpMyAdmin"
        isCorrect: false
      - id: d
        text: "WithMongoExpress"
        isCorrect: false
    explanation: "WithRedisInsight adds the Redis Insight graphical management tool (docker.io/redis/redisinsight:3.0). WithRedisCommander adds a web-based CLI, not a graphical UI. WithPhpMyAdmin and WithMongoExpress are for MySQL and MongoDB respectively."

  - text: "What does WithPersistence() configure on a Redis container?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "Replication to a secondary instance"
        isCorrect: false
      - id: b
        text: "RDB snapshotting for data durability"
        isCorrect: true
      - id: c
        text: "TLS encryption for connections"
        isCorrect: false
      - id: d
        text: "Password authentication"
        isCorrect: false
    explanation: "WithPersistence() configures Redis RDB snapshotting with configurable interval and key-change thresholds. It does not handle replication, TLS, or authentication. For data to survive container restarts, combine WithPersistence() with WithDataVolume()."

  - text: "Which cache server is a Microsoft-built, Redis-compatible alternative?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Valkey"
        isCorrect: false
      - id: b
        text: "Memcached"
        isCorrect: false
      - id: c
        text: "Garnet"
        isCorrect: true
      - id: d
        text: "KeyDB"
        isCorrect: false
    explanation: "Garnet is Microsoft Research's high-performance, Redis-compatible cache (ghcr.io/microsoft/garnet:1.0). Valkey is the Linux Foundation's community fork of Redis. Memcached and KeyDB are unrelated projects not included in Aspire."

  - text: "What happens to Redis data if WithDataVolume() is NOT configured?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Data persists in the container layer"
        isCorrect: false
      - id: b
        text: "Data is written to the host filesystem"
        isCorrect: false
      - id: c
        text: "Data is lost when the container stops"
        isCorrect: true
      - id: d
        text: "Data is replicated to other containers"
        isCorrect: false
    explanation: "Without WithDataVolume(), Redis data exists only in the container's ephemeral storage layer. When the container stops, all data is lost. Even WithPersistence() only writes snapshots inside the container — without a volume, those snapshots are also lost on container removal."

  - text: |
      What does this configuration achieve?
      ```csharp
      var cache = builder.AddRedis("cache")
          .WithDataVolume()
          .WithPersistence(interval: TimeSpan.FromSeconds(10));
      ```
    type: code-prediction
    sortOrder: 5
    points: 15
    options:
      - id: a
        text: "Redis snapshots data to disk every 10 seconds, stored in a Docker volume that persists across container restarts"
        isCorrect: true
      - id: b
        text: "Redis replicates data to a backup every 10 seconds"
        isCorrect: false
      - id: c
        text: "The Redis container restarts every 10 seconds"
        isCorrect: false
      - id: d
        text: "Cache entries expire after 10 seconds"
        isCorrect: false
    explanation: "WithDataVolume() creates a Docker-managed named volume mounted at Redis's data directory. WithPersistence(interval: 10s) configures RDB snapshotting every 10 seconds. Together, they ensure data survives container restarts."
