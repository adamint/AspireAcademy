questions:
  - text: "What transport protocol does the Aspire MCP server use?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "HTTP REST API"
        isCorrect: false
      - id: b
        text: "Stdio (standard input/output)"
        isCorrect: true
      - id: c
        text: "WebSocket"
        isCorrect: false
      - id: d
        text: "gRPC"
        isCorrect: false
    explanation: "AgentMcpCommand starts the MCP server using StdioMcpTransportFactory, which communicates over stdin/stdout. This allows any MCP-compatible AI agent to connect by launching the aspire agent mcp process."

  - text: "How many built-in MCP tools does the Aspire MCP server expose?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "8"
        isCorrect: false
      - id: b
        text: "14"
        isCorrect: true
      - id: c
        text: "20"
        isCorrect: false
      - id: d
        text: "5"
        isCorrect: false
    explanation: "The MCP server exposes 14 built-in tools: list_resources, execute_resource_command, list_console_logs, list_structured_logs, list_traces, list_trace_structured_logs, select_apphost, list_apphosts, list_integrations, doctor, refresh_tools, list_docs, search_docs, and get_doc."

  - text: "What does the refresh_tools MCP tool do?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Updates the Aspire CLI to the latest version"
        isCorrect: false
      - id: b
        text: "Re-scans for dynamic resource tools and emits a tool_list_changed notification"
        isCorrect: true
      - id: c
        text: "Restarts all running resources"
        isCorrect: false
      - id: d
        text: "Clears the MCP server cache"
        isCorrect: false
    explanation: "refresh_tools triggers McpResourceToolRefreshService to re-scan running resources for any MCP tools they expose, then emits a tool_list_changed notification so connected AI agents update their tool list."

  - text: "What does aspire agent init detect about your workspace?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Only the .NET SDK version"
        isCorrect: false
      - id: b
        text: "AI agent environments, git root, and supported MCP configurations"
        isCorrect: true
      - id: c
        text: "Only Docker availability"
        isCorrect: false
      - id: d
        text: "Only NuGet package sources"
        isCorrect: false
    explanation: "AgentInitCommand discovers the git root (for workspace root), detects supported AI agent environments via IAgentEnvironmentDetector, applies config migrations, and prompts for skill and MCP server setup."

  - text: "Where does the MCP server's documentation search get its content?"
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "Local XML documentation from the Aspire SDK"
        isCorrect: false
      - id: b
        text: "Downloads and caches https://aspire.dev/llms-small.txt"
        isCorrect: true
      - id: c
        text: "Scrapes the Microsoft Learn website in real-time"
        isCorrect: false
      - id: d
        text: "Reads README.md files from the project directory"
        isCorrect: false
    explanation: "DocsFetcher downloads https://aspire.dev/llms-small.txt with ETag caching. DocsCache stores the content in memory and on disk. DocsIndexService parses it for keyword-based search used by the search_docs and list_docs tools."
