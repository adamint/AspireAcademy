questions:
  - text: "What is the default container lifetime in Aspire?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "Persistent"
        isCorrect: false
      - id: b
        text: "Session"
        isCorrect: true
      - id: c
        text: "Scoped"
        isCorrect: false
      - id: d
        text: "Singleton"
        isCorrect: false
    explanation: "Containers default to `ContainerLifetime.Session` — they start and stop with the AppHost process."

  - text: "Which method mounts a host directory into a container?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "`WithVolume()`"
        isCorrect: false
      - id: b
        text: "`WithBindMount()`"
        isCorrect: true
      - id: c
        text: "`WithDirectory()`"
        isCorrect: false
      - id: d
        text: "`WithMount()`"
        isCorrect: false
    explanation: "`WithBindMount()` maps a host filesystem path directly into the container. `WithVolume()` uses Docker-managed named volumes instead."

  - text: "How do containers resolve each other by name in Aspire?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Shared environment variable"
        isCorrect: false
      - id: b
        text: "DNS aliases on the Aspire network"
        isCorrect: true
      - id: c
        text: "Dashboard API"
        isCorrect: false
      - id: d
        text: "YAML configuration file"
        isCorrect: false
    explanation: "Aspire creates a shared container network where each resource's name becomes a DNS alias."

  - text: "What does `WithDockerfile(\"./src\")` do?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Copies a Dockerfile to `./src`"
        isCorrect: false
      - id: b
        text: "Builds an image from the Dockerfile in `./src`"
        isCorrect: true
      - id: c
        text: "Validates Dockerfile syntax"
        isCorrect: false
      - id: d
        text: "Pulls an image tagged `src`"
        isCorrect: false
    explanation: "`WithDockerfile()` triggers a Docker build using the specified directory as the build context. It looks for a Dockerfile in that directory."

  - text: "What is `WithContainerRuntimeArgs()` for?"
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "Passing arguments to the container's entry-point"
        isCorrect: false
      - id: b
        text: "Passing arguments to the container runtime (Docker)"
        isCorrect: true
      - id: c
        text: "Setting environment variables"
        isCorrect: false
      - id: d
        text: "Passing build arguments"
        isCorrect: false
    explanation: "Runtime args go to the container runtime (e.g., Docker) itself, controlling resource limits and security options — not to the application inside the container."

  - text: |
      What container lifetime does this configure?
      ```csharp
      builder.AddContainer("redis", "redis:7")
          .WithLifetime(ContainerLifetime.Persistent);
      ```
    type: code-prediction
    sortOrder: 6
    points: 15
    options:
      - id: a
        text: "The container survives AppHost restarts — it stays running between debug sessions"
        isCorrect: true
      - id: b
        text: "The container is deleted after each request completes"
        isCorrect: false
      - id: c
        text: "The container restarts automatically if it crashes"
        isCorrect: false
      - id: d
        text: "The container is shared between multiple AppHost instances"
        isCorrect: false
    explanation: "ContainerLifetime.Persistent tells Aspire to keep the container running even when the AppHost stops. This avoids slow container startup on each debug cycle, preserving data in development."
