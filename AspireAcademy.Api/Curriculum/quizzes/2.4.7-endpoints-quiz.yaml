questions:
  - text: "What is the difference between `Port` and `TargetPort` in an endpoint?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "`Port` is internal; `TargetPort` is external"
        isCorrect: false
      - id: b
        text: "`Port` is the external-facing proxy port; `TargetPort` is what the app listens on"
        isCorrect: true
      - id: c
        text: "They are aliases for the same value"
        isCorrect: false
      - id: d
        text: "`TargetPort` is only used for HTTPS"
        isCorrect: false
    explanation: "`Port` is the proxy/external port that consumers connect to. `TargetPort` is the port the application binds to inside the resource."

  - text: "Which method gives full endpoint configuration control?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "`WithHttpEndpoint()`"
        isCorrect: false
      - id: b
        text: "`WithEndpoint()` with a callback delegate"
        isCorrect: true
      - id: c
        text: "`WithExternalHttpEndpoints()`"
        isCorrect: false
      - id: d
        text: "`AddEndpoint()`"
        isCorrect: false
    explanation: "`WithEndpoint(name, callback)` accepts a callback that receives the `EndpointAnnotation`, giving access to all properties: scheme, transport, protocol, ports, and visibility."

  - text: "What happens when no port is specified in `WithHttpEndpoint()`?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Defaults to port 80"
        isCorrect: false
      - id: b
        text: "The build fails"
        isCorrect: false
      - id: c
        text: "Aspire auto-allocates an available port"
        isCorrect: true
      - id: d
        text: "Uses the launch profile port"
        isCorrect: false
    explanation: "Aspire dynamically finds an available port to prevent conflicts. This is the recommended approach for development."

  - text: "How do you make a specific endpoint externally accessible?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Set `IsExternal = true` via `WithEndpoint()` callback or use `WithExternalHttpEndpoints()`"
        isCorrect: true
      - id: b
        text: "Call `WithEndpoint()` without any callback"
        isCorrect: false
      - id: c
        text: "Specify port 80 or 443"
        isCorrect: false
      - id: d
        text: "Configure a firewall rule"
        isCorrect: false
    explanation: "Endpoints default to internal. Set `IsExternal = true` on a specific endpoint via callback, or use `WithExternalHttpEndpoints()` to mark all HTTP endpoints as external."
