questions:
  - text: "What is the default Kubernetes workload type for a stateless Aspire project resource?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "StatefulSet"
        isCorrect: false
      - id: b
        text: "Deployment"
        isCorrect: true
      - id: c
        text: "DaemonSet"
        isCorrect: false
      - id: d
        text: "Job"
        isCorrect: false
    explanation: "Aspire maps stateless compute resources (projects, workers) to Deployments. Resources with connection strings (databases, caches) get StatefulSets for stable storage and network identities."

  - text: "What three files/directories does the Kubernetes publisher generate in the Helm chart?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "Dockerfile, docker-compose.yaml, .env"
        isCorrect: false
      - id: b
        text: "Chart.yaml, values.yaml, templates/"
        isCorrect: true
      - id: c
        text: "deployment.yaml, service.yaml, configmap.yaml"
        isCorrect: false
      - id: d
        text: "manifest.json, kustomization.yaml, patches/"
        isCorrect: false
    explanation: "The publisher generates a standard Helm chart: Chart.yaml (metadata), values.yaml (parameterized values), and templates/<resource>/ directories containing per-resource YAML manifests."

  - text: "How does the Kubernetes publisher handle Aspire bind mounts?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Converts them to Kubernetes hostPath volumes"
        isCorrect: false
      - id: b
        text: "Converts them to PersistentVolumeClaims"
        isCorrect: false
      - id: c
        text: "Rejects them with an error — use WithDataVolume instead"
        isCorrect: true
      - id: d
        text: "Ignores them silently"
        isCorrect: false
    explanation: "Bind mounts don't translate to Kubernetes. The publisher rejects them and requires you to use WithDataVolume() instead, which maps to PersistentVolumeClaims."

  - text: "What Helm expression would an Aspire parameter named 'db-password' be translated to?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "${db-password}"
        isCorrect: false
      - id: b
        text: "{{ .Values.parameters.db-password }}"
        isCorrect: true
      - id: c
        text: "{db-password.inputs.value}"
        isCorrect: false
      - id: d
        text: "$(DB_PASSWORD)"
        isCorrect: false
    explanation: "HelmExtensions.ToHelmParameterExpression converts Aspire parameter expressions into Helm template syntax: {{ .Values.parameters.<name> }}. This lets operators customize values via helm install --set."

  - text: "What is the default Kubernetes Service type configured by KubernetesEnvironmentResource?"
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "NodePort"
        isCorrect: false
      - id: b
        text: "LoadBalancer"
        isCorrect: false
      - id: c
        text: "ClusterIP"
        isCorrect: true
      - id: d
        text: "ExternalName"
        isCorrect: false
    explanation: "DefaultServiceType is 'ClusterIP', which makes services internal-only by default. You can change it via WithProperties or customize individual services with PublishAsKubernetesService."
