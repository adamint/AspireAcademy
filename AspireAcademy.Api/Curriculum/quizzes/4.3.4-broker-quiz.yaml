questions:
  - text: "What environment variable pattern does `WithReference(rabbit)` inject when rabbit is from `AddRabbitMQ(\"messaging\")`?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "`services__messaging__amqp__0`"
        isCorrect: false
      - id: b
        text: "`ConnectionStrings__messaging` with an AMQP connection string"
        isCorrect: true
      - id: c
        text: "`RABBITMQ_URL`"
        isCorrect: false
      - id: d
        text: "`messaging__connectionString`"
        isCorrect: false
    explanation: "RabbitMQ implements IResourceWithConnectionString, so WithReference injects ConnectionStrings__messaging with the AMQP connection string (e.g., amqp://guest:guest@localhost:5672)."

  - text: "What is the key difference between Kafka and RabbitMQ in Aspire?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "Kafka retains messages for replay; RabbitMQ delivers and removes them"
        isCorrect: true
      - id: b
        text: "Only RabbitMQ works with Aspire's WithReference"
        isCorrect: false
      - id: c
        text: "Kafka requires a custom connection string; RabbitMQ doesn't"
        isCorrect: false
      - id: d
        text: "There is no difference in Aspire — both use the same API"
        isCorrect: false
    explanation: "Kafka retains messages in topics for a configurable period, allowing consumers to replay events. RabbitMQ is a traditional message broker that delivers messages to consumers and removes them from the queue. Both use ConnectionStrings__ in Aspire."

  - text: "Which method adds a web management UI to RabbitMQ?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "WithWebUI()"
        isCorrect: false
      - id: b
        text: "WithManagementPlugin()"
        isCorrect: true
      - id: c
        text: "WithDashboard()"
        isCorrect: false
      - id: d
        text: "WithRabbitMQAdmin()"
        isCorrect: false
    explanation: "RabbitMQ uses WithManagementPlugin() to enable the management web UI on port 15672. This is the standard RabbitMQ management plugin that provides queue monitoring, message rates, and connection details."

  - text: "What method enables JetStream persistent messaging for NATS?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "WithPersistence()"
        isCorrect: false
      - id: b
        text: "WithJetStream()"
        isCorrect: true
      - id: c
        text: "WithDataVolume()"
        isCorrect: false
      - id: d
        text: "WithStreaming()"
        isCorrect: false
    explanation: "NATS uses WithJetStream() to enable its persistent streaming subsystem. JetStream adds message persistence, at-least-once delivery, and stream-based messaging to the lightweight NATS protocol."
