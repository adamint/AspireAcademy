questions:
  - text: "When you call `WithReference(redis)` where redis is from `AddRedis(\"cache\")`, what environment variable pattern is used?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "`services__cache__tcp__0`"
        isCorrect: false
      - id: b
        text: "`ConnectionStrings__cache`"
        isCorrect: true
      - id: c
        text: "`REDIS_URL`"
        isCorrect: false
      - id: d
        text: "`cache__connectionString`"
        isCorrect: false
    explanation: "Redis implements IResourceWithConnectionString, so WithReference injects a connection string using the ConnectionStrings__{name} pattern. The name comes from the resource name passed to AddRedis."

  - text: "When you call `WithReference(api)` where api is from `AddProject<Projects.Api>(\"api\")`, what environment variable pattern is used?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "`ConnectionStrings__api`"
        isCorrect: false
      - id: b
        text: "`services__api__https__0` (and similar for each endpoint)"
        isCorrect: true
      - id: c
        text: "`API_URL`"
        isCorrect: false
      - id: d
        text: "`endpoints__api__0`"
        isCorrect: false
    explanation: "Projects implement IResourceWithServiceDiscovery, so WithReference injects service discovery variables using the services__{name}__{scheme}__{index} pattern. One variable is created for each endpoint (HTTP, HTTPS, etc.)."

  - text: "How does a consuming service use the connection string injected by WithReference?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "By calling `builder.Configuration.GetConnectionString(\"name\")` or using an Aspire client integration like `AddRedisClient(\"name\")`"
        isCorrect: true
      - id: b
        text: "By reading the raw environment variable with `Environment.GetEnvironmentVariable`"
        isCorrect: false
      - id: c
        text: "By calling `WithReference` again in the service's Program.cs"
        isCorrect: false
      - id: d
        text: "Connection strings are only available in the AppHost"
        isCorrect: false
    explanation: "Connection strings injected as ConnectionStrings__{name} are readable via IConfiguration.GetConnectionString(name). Aspire client integrations (AddRedisClient, AddNpgsqlDataSource, etc.) read from this configuration automatically."

  - text: |
      What does this AppHost code inject into the web project?
      ```csharp
      var redis = builder.AddRedis("cache");
      var api = builder.AddProject<Projects.Api>("api").WithReference(redis);
      builder.AddProject<Projects.Web>("web").WithReference(api);
      ```
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "The web project receives both the Redis connection string and API service URLs"
        isCorrect: false
      - id: b
        text: "The web project receives only the API service discovery URLs (services__api__...)"
        isCorrect: true
      - id: c
        text: "The web project receives the Redis connection string only"
        isCorrect: false
      - id: d
        text: "The web project receives nothing — WithReference only affects direct dependencies"
        isCorrect: false
    explanation: "WithReference(api) gives the web project the API's service discovery URLs. The Redis connection string is only injected into the API project (which has WithReference(redis)). References are not transitive — each project only gets what it directly references."
