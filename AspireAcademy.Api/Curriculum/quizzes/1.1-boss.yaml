questions:
  - text: "Which project in an Aspire solution is NOT deployed to production?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "ServiceDefaults"
        isCorrect: false
      - id: b
        text: "AppHost"
        isCorrect: true
      - id: c
        text: "Web API service"
        isCorrect: false
      - id: d
        text: "Worker service"
        isCorrect: false
    explanation: "The AppHost is the dev-time orchestrator. It defines the resource graph and runs only during development. ServiceDefaults and all service projects are deployed to production."

  - text: |
      Given this AppHost code, which statement is true?
      ```csharp
      var builder = DistributedApplication.CreateBuilder(args);
      var redis = builder.AddRedis("cache");
      var api = builder.AddProject<Projects.Api>("api")
                       .WithReference(redis);
      builder.AddProject<Projects.Web>("web")
             .WithReference(api);
      builder.Build().Run();
      ```
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "The Web project receives the Redis connection string directly"
        isCorrect: false
      - id: b
        text: "The API project receives the Redis connection string and the Web project receives the API's URL"
        isCorrect: true
      - id: c
        text: "Both projects receive both the Redis connection string and each other's URL"
        isCorrect: false
      - id: d
        text: "WithReference only works with container resources, not project resources"
        isCorrect: false
    explanation: "WithReference(redis) on the API project injects the Redis connection string into the API. WithReference(api) on the Web project injects the API's service URL into the Web frontend. Each WithReference only affects the builder it's called on."

  - text: "What are Aspire's two core pillars?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "Containers and Kubernetes"
        isCorrect: false
      - id: b
        text: "Orchestration and Observability"
        isCorrect: true
      - id: c
        text: "CI/CD and Deployment"
        isCorrect: false
      - id: d
        text: "Authentication and Authorization"
        isCorrect: false
    explanation: "Aspire focuses on two pillars: orchestration (defining app topology in C# with compile-time safety) and observability (automatic OpenTelemetry integration with a built-in Dashboard for logs, traces, and metrics)."

  - text: "What does the ServiceDefaults project provide to service projects?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Database migration scripts"
        isCorrect: false
      - id: b
        text: "Shared OpenTelemetry, health checks, service discovery, and HTTP resilience configuration"
        isCorrect: true
      - id: c
        text: "Docker container definitions"
        isCorrect: false
      - id: d
        text: "Authentication middleware"
        isCorrect: false
    explanation: "ServiceDefaults is a shared library that centralizes cross-cutting concerns. AddServiceDefaults() configures OpenTelemetry (tracing, metrics, logging), health check endpoints (/health and /alive), service discovery, and HTTP resilience (retry, circuit breaker, timeout) for every service that references it."

  - text: |
      A developer sees this project structure. Which project is the AppHost?
      ```
      MyApp/
      ├── MyApp.Orchestrator/      ← references all other projects
      │   └── Program.cs           ← calls DistributedApplication.CreateBuilder()
      ├── MyApp.Shared/
      │   └── Extensions.cs        ← defines AddServiceDefaults()
      ├── MyApp.Api/
      │   └── Program.cs           ← calls builder.AddServiceDefaults()
      └── MyApp.Frontend/
          └── Program.cs           ← calls builder.AddServiceDefaults()
      ```
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "MyApp.Shared — because it defines AddServiceDefaults()"
        isCorrect: false
      - id: b
        text: "MyApp.Api — because APIs are always the entry point"
        isCorrect: false
      - id: c
        text: "MyApp.Orchestrator — because it calls DistributedApplication.CreateBuilder() and references all projects"
        isCorrect: true
      - id: d
        text: "MyApp.Frontend — because frontends orchestrate backend calls"
        isCorrect: false
    explanation: "The AppHost is the project that calls DistributedApplication.CreateBuilder() and references all other projects. Its name doesn't matter — it could be 'Orchestrator', 'AppHost', or anything else. The key identifier is the CreateBuilder call and the project references."
