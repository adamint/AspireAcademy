title: "Module 6.8 Boss — Dashboard Internals"
description: "Test your understanding of how the Aspire dashboard ingests telemetry, stores data, and renders real-time updates."
passingScore: 80
questions:
  - id: "6.8.1"
    question: "What class serves as the composition root that wires up gRPC telemetry services, DashboardClient, authentication, and Blazor rendering for the Aspire dashboard?"
    type: "multiple_choice"
    options:
      - "DashboardService"
      - "DashboardWebApplication"
      - "TelemetryRepository"
      - "OtlpGrpcTraceService"
    correctAnswer: "DashboardWebApplication"
    explanation: "DashboardWebApplication (src/Aspire.Dashboard/DashboardWebApplication.cs) is the composition root. It maps gRPC services (OtlpGrpcTraceService, OtlpGrpcLogsService, OtlpGrpcMetricsService), registers DashboardClient, configures auth, and sets up Blazor Server."

  - id: "6.8.2"
    question: "What data structure does TelemetryRepository use to store telemetry with bounded memory, automatically evicting the oldest entries when full?"
    type: "multiple_choice"
    options:
      - "ConcurrentDictionary with TTL expiration"
      - "CircularBuffer ring buffers"
      - "SQLite in-memory database"
      - "BoundedChannel with DropOldest"
    correctAnswer: "CircularBuffer ring buffers"
    explanation: "TelemetryRepository (src/Aspire.Dashboard/Otlp/Storage/TelemetryRepository.cs) uses CircularBuffer ring buffers with configurable limits. BoundedChannel is used for the watcher/streaming pattern, not primary storage."

  - id: "6.8.3"
    question: "Which gRPC service receives exported trace spans from applications instrumented with OpenTelemetry?"
    type: "multiple_choice"
    options:
      - "OtlpGrpcMetricsService"
      - "OtlpGrpcLogsService"
      - "OtlpGrpcTraceService"
      - "DashboardClient"
    correctAnswer: "OtlpGrpcTraceService"
    explanation: "OtlpGrpcTraceService (src/Aspire.Dashboard/Otlp/Grpc/OtlpGrpcTraceService.cs) has an Export() method that receives ExportTraceServiceRequest protobuf messages, deserializes spans, and passes them to TelemetryRepository."

  - id: "6.8.4"
    question: "How does WatchSpansAsync() in TelemetryRepository stream new trace data to subscribers without causing backpressure?"
    type: "multiple_choice"
    options:
      - "Polling with 100ms interval"
      - "BoundedChannel with DropOldest mode"
      - "SignalR hub broadcasting"
      - "Unbounded ConcurrentQueue"
    correctAnswer: "BoundedChannel with DropOldest mode"
    explanation: "WatchSpansAsync() (in TelemetryRepository.Watchers.cs) uses BoundedChannel with BoundedChannelFullMode.DropOldest for O(1) streaming. If a slow subscriber falls behind, old notifications are dropped rather than blocking producers."

  - id: "6.8.5"
    question: "When the dashboard shows connection lines between your API project and a Postgres database (which doesn't emit traces), what resolves the relationship?"
    type: "multiple_choice"
    options:
      - "ExpressionResolver matches endpoint references"
      - "ResourceOutgoingPeerResolver matches peer attributes to known resources"
      - "DashboardClient infers connections from the app model"
      - "TelemetryRepository joins traces by service.name"
    correctAnswer: "ResourceOutgoingPeerResolver matches peer attributes to known resources"
    explanation: "ResourceOutgoingPeerResolver examines outgoing span attributes (net.peer.name, db.system) and matches them against known Aspire resource endpoints. This is how uninstrumented services like databases appear in the trace dependency graph."

  - id: "6.8.6"
    question: |
      What happens when TelemetryRepository's trace buffer is full and new spans arrive?
      ```csharp
      // TelemetryRepository uses CircularBuffer for trace storage
      // Default capacity: 10,000 traces
      ```
    type: "code_prediction"
    options:
      - "New spans are dropped silently"
      - "The oldest traces are evicted to make room for new ones"
      - "An OutOfMemoryException is thrown"
      - "The buffer doubles in size automatically"
    correctAnswer: "The oldest traces are evicted to make room for new ones"
    explanation: "CircularBuffer is a ring buffer — when capacity is reached, writing new entries overwrites the oldest entries automatically. This gives the dashboard O(1) writes with bounded memory, at the cost of losing old data."
