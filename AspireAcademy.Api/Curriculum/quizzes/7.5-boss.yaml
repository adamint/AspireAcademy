questions:
  - text: "Which method converts a .NET project resource to build as a container image during publish?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "WithDockerfile()"
        isCorrect: false
      - id: b
        text: "PublishAsDockerFile()"
        isCorrect: true
      - id: c
        text: "AddDockerfile()"
        isCorrect: false
      - id: d
        text: "WithContainerImage()"
        isCorrect: false
    explanation: "PublishAsDockerFile() converts project or executable resources that aren't Dockerfile-based by default into container image builds during the publish pipeline."

  - text: "What happens when you use WithBuildArg with a secret ParameterResource?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "The secret is Base64-encoded and passed as a build argument"
        isCorrect: false
      - id: b
        text: "It is rejected — you must use WithBuildSecret for secret parameters"
        isCorrect: true
      - id: c
        text: "The secret is masked in build logs automatically"
        isCorrect: false
      - id: d
        text: "The secret is stored in a .env file"
        isCorrect: false
    explanation: "WithBuildArg explicitly rejects secret ParameterResource values to prevent accidental exposure in build logs. Secret values must use WithBuildSecret, which passes them via Docker build secrets."

  - text: "What two pipeline steps does EnsureBuildAndPushPipelineAnnotations create for each resource?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "validate-<resource> and deploy-<resource>"
        isCorrect: false
      - id: b
        text: "build-<resource> and push-<resource>"
        isCorrect: true
      - id: c
        text: "compile-<resource> and upload-<resource>"
        isCorrect: false
      - id: d
        text: "dockerfile-<resource> and registry-<resource>"
        isCorrect: false
    explanation: "EnsureBuildAndPushPipelineAnnotations creates build-<resource> (tagged 'build-compute', depends on build-prereq, required by build) and push-<resource> (tagged 'push-container-image', required by push)."

  - text: "How does Aspire build container images for ProjectResource?"
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "Always uses docker build with a generated Dockerfile"
        isCorrect: false
      - id: b
        text: "Runs dotnet publish /t:PublishContainer using the .NET SDK"
        isCorrect: true
      - id: c
        text: "Uses Buildpacks to auto-detect the runtime"
        isCorrect: false
      - id: d
        text: "Compiles to a native binary and wraps it in a scratch image"
        isCorrect: false
    explanation: "For ProjectResource, ResourceContainerImageManager uses dotnet publish /t:PublishContainer, which leverages the .NET SDK's built-in container publishing. For Dockerfile-based resources, it delegates to the container runtime's build command."

  - text: "What does setting ContainerImageDestination to Archive do?"
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "Compresses the image layers with gzip"
        isCorrect: false
      - id: b
        text: "Saves the image as a tar archive file and skips pushing to a registry"
        isCorrect: true
      - id: c
        text: "Archives the Dockerfile and build context"
        isCorrect: false
      - id: d
        text: "Backs up the existing image before rebuilding"
        isCorrect: false
    explanation: "When destination is Archive, the image is saved as a tar file at OutputPath and the push step is skipped entirely. This is useful for air-gapped deployments or when you want to transfer images manually."
