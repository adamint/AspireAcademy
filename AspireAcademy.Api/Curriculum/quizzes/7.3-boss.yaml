questions:
  - text: "Which extension method registers a Docker Compose publishing environment?"
    type: multiple-choice
    sortOrder: 1
    points: 10
    options:
      - id: a
        text: "AddDockerCompose()"
        isCorrect: false
      - id: b
        text: "AddDockerComposeEnvironment()"
        isCorrect: true
      - id: c
        text: "WithDockerCompose()"
        isCorrect: false
      - id: d
        text: "PublishAsDockerCompose()"
        isCorrect: false
    explanation: "AddDockerComposeEnvironment(builder, name) creates a DockerComposeEnvironmentResource that tells the pipeline to generate Docker Compose output."

  - text: "How are Aspire ParameterResource values represented in Docker Compose files?"
    type: multiple-choice
    sortOrder: 2
    points: 10
    options:
      - id: a
        text: "Hardcoded literal values in the YAML"
        isCorrect: false
      - id: b
        text: "Environment variable placeholders like ${VAR_NAME} with values in a .env file"
        isCorrect: true
      - id: c
        text: "Kubernetes secrets references"
        isCorrect: false
      - id: d
        text: "Docker secrets mounted as files"
        isCorrect: false
    explanation: "Parameters become ${VAR_NAME} placeholders in the compose YAML, with actual values stored in the .env file. This lets operators customize values without editing the compose file directly."

  - text: "What network is added by default when generating a Docker Compose file?"
    type: multiple-choice
    sortOrder: 3
    points: 10
    options:
      - id: a
        text: "bridge"
        isCorrect: false
      - id: b
        text: "aspire"
        isCorrect: true
      - id: c
        text: "default"
        isCorrect: false
      - id: d
        text: "host"
        isCorrect: false
    explanation: "DockerComposePublishingContext creates a default bridge network named 'aspire' (configurable via DefaultNetworkName). All services join this network for inter-service DNS resolution."

  - text: |
      What four pipeline steps does a Docker Compose environment inject?
    type: multiple-choice
    sortOrder: 4
    points: 10
    options:
      - id: a
        text: "build, test, deploy, cleanup"
        isCorrect: false
      - id: b
        text: "publish-<env>, prepare-<env>, docker-compose-up-<env>, docker-compose-down-<env>"
        isCorrect: true
      - id: c
        text: "init, build, push, run"
        isCorrect: false
      - id: d
        text: "validate, generate, apply, verify"
        isCorrect: false
    explanation: "Docker Compose environments inject four steps: publish (writes compose YAML), prepare (writes .env file), docker-compose-up (runs docker compose up -d), and docker-compose-down (cleanup). They form a dependency chain."

  - text: "What does PublishAsDockerComposeService allow you to do?"
    type: multiple-choice
    sortOrder: 5
    points: 10
    options:
      - id: a
        text: "Convert a project to a Docker container at build time"
        isCorrect: false
      - id: b
        text: "Customize how a specific resource appears in the generated compose file"
        isCorrect: true
      - id: c
        text: "Publish only that service while skipping others"
        isCorrect: false
      - id: d
        text: "Run docker compose for a single service"
        isCorrect: false
    explanation: "PublishAsDockerComposeService<T>(configure) lets you modify the compose Service object for a specific resource — setting restart policies, resource limits, deploy config, etc. via a callback."
