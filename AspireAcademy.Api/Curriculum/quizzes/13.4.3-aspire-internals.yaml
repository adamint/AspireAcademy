questions:
- text: What is the relationship between an AppHost and DCP?
  type: multiple-choice
  options:
  - id: a
    text: DCP is a library linked into the AppHost
    isCorrect: false
  - id: b
    text: The AppHost is declarative (what to run); DCP is imperative (executes the plan) via gRPC
    isCorrect: true
  - id: c
    text: DCP replaces the AppHost in production
    isCorrect: false
  - id: d
    text: They are the same process
    isCorrect: false
  explanation: The AppHost builds the declarative app model. DCP is a separate process that receives the model via gRPC and executes it — pulling images, starting containers, allocating ports, and reporting
    state changes back.
- text: What happens when DistributedApplicationBuilder.Build() is called?
  type: multiple-choice
  options:
  - id: a
    text: DCP starts and containers are created
    isCorrect: false
  - id: b
    text: The resource collection is frozen, duplicates are validated, and an IHost is built
    isCorrect: true
  - id: c
    text: The Dashboard opens
    isCorrect: false
  - id: d
    text: Environment variables are injected
    isCorrect: false
  explanation: Build() validates there are no duplicate resource names (case-insensitive), freezes the app model, and builds the underlying IHost. No containers start — that happens when Run() is called.
- text: How does DCP differ from Kubernetes?
  type: multiple-choice
  options:
  - id: a
    text: DCP is a full Kubernetes replacement
    isCorrect: false
  - id: b
    text: DCP is a local-only, development-optimized orchestrator with K8s-inspired CRDs but no cluster networking or scaling
    isCorrect: true
  - id: c
    text: DCP runs inside Kubernetes
    isCorrect: false
  - id: d
    text: DCP only works on Linux
    isCorrect: false
  explanation: 'DCP borrows K8s concepts (CRDs, resource types, reconciliation) but is optimized for local dev: single-machine scope, no scheduling, ephemeral by default, direct container runtime access,
    and startup speed over resilience.'
- text: What does the backchannel protocol in ~/.aspire/cli/backchannels/ use?
  type: multiple-choice
  options:
  - id: a
    text: gRPC over HTTP/2
    isCorrect: false
  - id: b
    text: JSON-RPC 2.0 over Unix domain sockets
    isCorrect: true
  - id: c
    text: REST over HTTPS
    isCorrect: false
  - id: d
    text: Protocol Buffers over TCP
    isCorrect: false
  explanation: The backchannel uses JSON-RPC 2.0 over Unix domain sockets. Each running AppHost creates a socket file. The CLI discovers running AppHosts by listing sockets in this directory.
- text: What is PublicAPI.Shipped.txt in an Aspire.Hosting.* project?
  type: multiple-choice
  options:
  - id: a
    text: A list of nuget.org package versions
    isCorrect: false
  - id: b
    text: A Roslyn API tracking file that lists all public type and method signatures to detect breaking changes
    isCorrect: true
  - id: c
    text: A changelog
    isCorrect: false
  - id: d
    text: A list of exported Docker images
    isCorrect: false
  explanation: PublicAPI.Shipped.txt and PublicAPI.Unshipped.txt are Roslyn API tracking files. They list every public type, method, and property signature. CI fails if you change a public API without updating
    these files, preventing accidental breaking changes.
